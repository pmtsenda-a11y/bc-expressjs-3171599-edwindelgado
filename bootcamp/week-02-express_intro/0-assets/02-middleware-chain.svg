<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="480" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#e6edf3">Cadena de Middleware en Express</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#8b949e">Cada middleware decide si continúa (next) o responde directamente</text>

  <!-- ===== REQUEST INPUT ===== -->
  <rect x="20" y="80" width="80" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="60" y="103" text-anchor="middle" font-size="12" fill="#e6edf3">Request</text>

  <!-- Arrow to first middleware -->
  <line x1="100" y1="98" x2="128" y2="98" stroke="#68A063" stroke-width="2" marker-end="url(#aw-g)"/>

  <!-- ===== MIDDLEWARE 1: express.json() ===== -->
  <rect x="128" y="76" width="110" height="44" rx="6" fill="#0d4a2a" stroke="#68A063" stroke-width="1.5"/>
  <text x="183" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#68A063">express.json()</text>
  <text x="183" y="109" text-anchor="middle" font-size="10" fill="#a5d6a7">parsea req.body</text>

  <!-- Arrow right -->
  <line x1="238" y1="98" x2="264" y2="98" stroke="#68A063" stroke-width="2" marker-end="url(#aw-g)"/>
  <text x="251" y="88" text-anchor="middle" font-size="9" fill="#68A063">next()</text>

  <!-- ===== MIDDLEWARE 2: logger ===== -->
  <rect x="264" y="76" width="110" height="44" rx="6" fill="#1a2840" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="319" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#58a6ff">logger</text>
  <text x="319" y="109" text-anchor="middle" font-size="10" fill="#a8c8f8">registra method + url</text>

  <!-- Arrow right -->
  <line x1="374" y1="98" x2="400" y2="98" stroke="#68A063" stroke-width="2" marker-end="url(#aw-g)"/>
  <text x="387" y="88" text-anchor="middle" font-size="9" fill="#68A063">next()</text>

  <!-- ===== MIDDLEWARE 3: auth ===== -->
  <rect x="400" y="76" width="110" height="44" rx="6" fill="#2d1a3a" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="455" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#bc8cff">auth</text>
  <text x="455" y="109" text-anchor="middle" font-size="10" fill="#d2b4ff">verifica JWT</text>

  <!-- Branch: valid token → next, invalid → 401 -->
  <!-- Arrow right (valid) -->
  <line x1="510" y1="98" x2="536" y2="98" stroke="#68A063" stroke-width="2" marker-end="url(#aw-g)"/>
  <text x="523" y="88" text-anchor="middle" font-size="9" fill="#68A063">next()</text>
  <!-- Arrow down (invalid) -->
  <line x1="455" y1="120" x2="455" y2="165" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aw-r)"/>
  <text x="480" y="148" text-anchor="start" font-size="9" fill="#f85149">401 Unauthorized</text>

  <!-- ===== ROUTE HANDLER ===== -->
  <rect x="536" y="76" width="110" height="44" rx="6" fill="#2a1a10" stroke="#f0883e" stroke-width="1.5"/>
  <text x="591" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#f0883e">Route Handler</text>
  <text x="591" y="109" text-anchor="middle" font-size="10" fill="#ffc5a0">res.json(data)</text>

  <!-- Arrow right: response exits -->
  <line x1="646" y1="98" x2="680" y2="98" stroke="#f0883e" stroke-width="2" marker-end="url(#aw-o)"/>

  <!-- Response box -->
  <rect x="680" y="80" width="90" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="725" y="103" text-anchor="middle" font-size="12" fill="#e6edf3">Response</text>

  <!-- ===== 404 HANDLER (below) ===== -->
  <text x="400" y="230" text-anchor="middle" font-size="11" fill="#8b949e">Si ninguna ruta coincide, la petición cae al handler 404</text>

  <line x1="591" y1="120" x2="591" y2="260" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="591" y1="260" x2="530" y2="260" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aw-gray)"/>

  <rect x="330" y="244" width="200" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="430" y="261" text-anchor="middle" font-size="11" font-weight="600" fill="#8b949e">404 Not Found Handler</text>
  <text x="430" y="275" text-anchor="middle" font-size="10" fill="#8b949e">res.status(404).json({ error })</text>

  <!-- ===== ERROR HANDLER ===== -->
  <text x="400" y="330" text-anchor="middle" font-size="11" fill="#8b949e">Si algún middleware llama next(err), la petición cae al error handler</text>

  <!-- next(err) arrow from route handler down -->
  <line x1="455" y1="165" x2="455" y2="205" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="591" y1="120" x2="591" y2="340" stroke="#f85149" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="455" y1="350" x2="530" y2="350" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aw-r)"/>
  <line x1="591" y1="340" x2="591" y2="350" stroke="#f85149" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="530" y="336" width="230" height="40" rx="6" fill="#2a1018" stroke="#f85149" stroke-width="1.5"/>
  <text x="645" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#f85149">Error Handler (4 params)</text>
  <text x="645" y="367" text-anchor="middle" font-size="10" fill="#ffa8a8">(err, req, res, next) → siempre último</text>

  <!-- ===== ORDER ANNOTATION ===== -->
  <rect x="20" y="400" width="760" height="58" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="40" y="418" font-size="11" font-weight="600" fill="#e6edf3">Orden correcto en app.ts:</text>
  <text x="40" y="434" font-size="10" fill="#8b949e">1. express.json()   2. logger   3. auth   4. Routes (app.use('/api', router))   5. 404 handler   6. Error handler</text>
  <text x="40" y="450" font-size="10" fill="#f85149">⚠️  El error handler SIEMPRE debe registrarse último con app.use((err, req, res, next) ⇒ …)</text>

  <!-- Defs -->
  <defs>
    <marker id="aw-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#68A063"/>
    </marker>
    <marker id="aw-r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f85149"/>
    </marker>
    <marker id="aw-o" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
    </marker>
    <marker id="aw-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
