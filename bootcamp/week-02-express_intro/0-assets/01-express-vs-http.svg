<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#e6edf3">Express vs Node.js http nativo</text>

  <!-- ===== LEFT SIDE: http nativo ===== -->
  <text x="175" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#8b949e">http nativo (Node.js)</text>

  <!-- Client box -->
  <rect x="30" y="88" width="90" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="75" y="111" text-anchor="middle" font-size="12" fill="#e6edf3">Cliente</text>

  <!-- Arrow client -> server -->
  <line x1="120" y1="106" x2="148" y2="106" stroke="#68A063" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- http.createServer box -->
  <rect x="148" y="88" width="110" height="36" rx="6" fill="#161b22" stroke="#68A063" stroke-width="1.5"/>
  <text x="203" y="104" text-anchor="middle" font-size="11" fill="#68A063">http.createServer</text>
  <text x="203" y="118" text-anchor="middle" font-size="10" fill="#8b949e">(req, res) callback</text>

  <!-- Arrow down to manual parsing -->
  <line x1="203" y1="124" x2="203" y2="150" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Manual parsing box -->
  <rect x="148" y="150" width="110" height="52" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="203" y="167" text-anchor="middle" font-size="10" fill="#8b949e">if (req.method === 'GET'</text>
  <text x="203" y="181" text-anchor="middle" font-size="10" fill="#8b949e">&amp;&amp; req.url === '/users')</text>
  <text x="203" y="195" text-anchor="middle" font-size="10" fill="#f85149">manual parsing</text>

  <!-- Arrow down -->
  <line x1="203" y1="202" x2="203" y2="228" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Collect body box -->
  <rect x="148" y="228" width="110" height="40" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="203" y="245" text-anchor="middle" font-size="10" fill="#8b949e">req.on('data', ...)</text>
  <text x="203" y="259" text-anchor="middle" font-size="10" fill="#8b949e">req.on('end', ...)</text>

  <!-- Arrow down -->
  <line x1="203" y1="268" x2="203" y2="294" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Write response box -->
  <rect x="148" y="294" width="110" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="203" y="311" text-anchor="middle" font-size="10" fill="#8b949e">res.writeHead(200)</text>
  <text x="203" y="325" text-anchor="middle" font-size="10" fill="#8b949e">res.end(JSON.stringify)</text>

  <!-- Pain label -->
  <rect x="120" y="360" width="130" height="26" rx="4" fill="#21262d" stroke="#f85149" stroke-width="1"/>
  <text x="185" y="377" text-anchor="middle" font-size="11" fill="#f85149">Repetitivo y propenso a errores</text>

  <!-- Divider -->
  <line x1="380" y1="60" x2="380" y2="400" stroke="#21262d" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ===== RIGHT SIDE: Express ===== -->
  <text x="590" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#68A063">Express 5</text>

  <!-- Client box -->
  <rect x="438" y="88" width="90" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="483" y="111" text-anchor="middle" font-size="12" fill="#e6edf3">Cliente</text>

  <!-- Arrow to express -->
  <line x1="528" y1="106" x2="556" y2="106" stroke="#68A063" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Express app box -->
  <rect x="556" y="88" width="110" height="36" rx="6" fill="#0d4a2a" stroke="#68A063" stroke-width="1.5"/>
  <text x="611" y="104" text-anchor="middle" font-size="11" fill="#68A063">app.ts / Express()</text>
  <text x="611" y="118" text-anchor="middle" font-size="10" fill="#a5d6a7">createApp() factory</text>

  <!-- Arrow down -->
  <line x1="611" y1="124" x2="611" y2="150" stroke="#68A063" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Middleware pipeline -->
  <rect x="543" y="150" width="136" height="36" rx="6" fill="#0d4a2a" stroke="#68A063" stroke-width="1.5"/>
  <text x="611" y="167" text-anchor="middle" font-size="11" fill="#68A063">express.json()</text>
  <text x="611" y="181" text-anchor="middle" font-size="10" fill="#a5d6a7">body parsing automático</text>

  <!-- Arrow down -->
  <line x1="611" y1="186" x2="611" y2="210" stroke="#68A063" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Router box -->
  <rect x="543" y="210" width="136" height="36" rx="6" fill="#0d4a2a" stroke="#68A063" stroke-width="1.5"/>
  <text x="611" y="227" text-anchor="middle" font-size="11" fill="#68A063">Router</text>
  <text x="611" y="241" text-anchor="middle" font-size="10" fill="#a5d6a7">app.get('/users', handler)</text>

  <!-- Arrow down -->
  <line x1="611" y1="246" x2="611" y2="270" stroke="#68A063" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Handler box -->
  <rect x="543" y="270" width="136" height="36" rx="6" fill="#0d4a2a" stroke="#68A063" stroke-width="1.5"/>
  <text x="611" y="287" text-anchor="middle" font-size="11" fill="#68A063">Route Handler</text>
  <text x="611" y="301" text-anchor="middle" font-size="10" fill="#a5d6a7">res.json(data)</text>

  <!-- Win label -->
  <rect x="530" y="360" width="154" height="26" rx="4" fill="#0d4a2a" stroke="#68A063" stroke-width="1"/>
  <text x="607" y="377" text-anchor="middle" font-size="11" fill="#68A063">Conciso, modular y testeable</text>

  <!-- ===== LEGEND / COMPARISON TABLE ===== -->
  <rect x="30" y="390" width="740" height="22" rx="4" fill="#161b22"/>
  <text x="155" y="405" text-anchor="middle" font-size="10" fill="#8b949e">http nativo: ~40 líneas por ruta</text>
  <text x="400" y="405" text-anchor="middle" font-size="10" fill="#30363d">|</text>
  <text x="600" y="405" text-anchor="middle" font-size="10" fill="#68A063">Express: ~5 líneas por ruta + middlewares reutilizables</text>

  <!-- Defs for arrows -->
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#68A063"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
