<svg width="800" height="460" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="460" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#e6edf3">HTTP Methods y Status Codes</text>

  <!-- ===== LEFT PANEL: HTTP Methods ===== -->
  <rect x="20" y="52" width="370" height="30" rx="6" fill="#161b22"/>
  <text x="205" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">Métodos HTTP (verbos)</text>

  <!-- Header row -->
  <rect x="20" y="82" width="370" height="24" fill="#21262d" rx="4"/>
  <text x="60" y="99" text-anchor="middle" font-size="10" font-weight="600" fill="#8b949e">MÉTODO</text>
  <text x="145" y="99" text-anchor="middle" font-size="10" font-weight="600" fill="#8b949e">RUTA</text>
  <text x="285" y="99" text-anchor="middle" font-size="10" font-weight="600" fill="#8b949e">ACCIÓN</text>
  <text x="365" y="99" text-anchor="middle" font-size="10" font-weight="600" fill="#8b949e">CÓDIGO</text>

  <!-- GET row -->
  <rect x="20" y="106" width="370" height="28" fill="#0d1117" rx="2"/>
  <rect x="20" y="106" width="370" height="28" fill="none" stroke="#21262d" stroke-width="0.5"/>
  <rect x="24" y="112" width="52" height="16" rx="3" fill="#0d4a2a"/>
  <text x="50" y="124" text-anchor="middle" font-size="10" font-weight="700" fill="#68A063">GET</text>
  <text x="145" y="125" text-anchor="middle" font-size="10" fill="#8b949e">/items   /items/:id</text>
  <text x="285" y="125" text-anchor="middle" font-size="10" fill="#e6edf3">Obtener recurso(s)</text>
  <text x="365" y="125" text-anchor="middle" font-size="10" fill="#68A063">200</text>

  <!-- POST row -->
  <rect x="20" y="134" width="370" height="28" fill="#0d1117" rx="2"/>
  <rect x="20" y="134" width="370" height="28" fill="none" stroke="#21262d" stroke-width="0.5"/>
  <rect x="24" y="140" width="52" height="16" rx="3" fill="#192840"/>
  <text x="50" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#58a6ff">POST</text>
  <text x="145" y="153" text-anchor="middle" font-size="10" fill="#8b949e">/items</text>
  <text x="285" y="153" text-anchor="middle" font-size="10" fill="#e6edf3">Crear recurso</text>
  <text x="365" y="153" text-anchor="middle" font-size="10" fill="#58a6ff">201</text>

  <!-- PUT row -->
  <rect x="20" y="162" width="370" height="28" fill="#0d1117" rx="2"/>
  <rect x="20" y="162" width="370" height="28" fill="none" stroke="#21262d" stroke-width="0.5"/>
  <rect x="24" y="168" width="52" height="16" rx="3" fill="#2d1f04"/>
  <text x="50" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="#e3b341">PUT</text>
  <text x="145" y="181" text-anchor="middle" font-size="10" fill="#8b949e">/items/:id</text>
  <text x="285" y="181" text-anchor="middle" font-size="10" fill="#e6edf3">Reemplazar recurso</text>
  <text x="365" y="181" text-anchor="middle" font-size="10" fill="#e3b341">200</text>

  <!-- PATCH row -->
  <rect x="20" y="190" width="370" height="28" fill="#0d1117" rx="2"/>
  <rect x="20" y="190" width="370" height="28" fill="none" stroke="#21262d" stroke-width="0.5"/>
  <rect x="24" y="196" width="52" height="16" rx="3" fill="#2a1a10"/>
  <text x="50" y="208" text-anchor="middle" font-size="10" font-weight="700" fill="#f0883e">PATCH</text>
  <text x="145" y="209" text-anchor="middle" font-size="10" fill="#8b949e">/items/:id</text>
  <text x="285" y="209" text-anchor="middle" font-size="10" fill="#e6edf3">Actualizar campos</text>
  <text x="365" y="209" text-anchor="middle" font-size="10" fill="#f0883e">200</text>

  <!-- DELETE row -->
  <rect x="20" y="218" width="370" height="28" fill="#0d1117" rx="2"/>
  <rect x="20" y="218" width="370" height="28" fill="none" stroke="#21262d" stroke-width="0.5"/>
  <rect x="24" y="224" width="52" height="16" rx="3" fill="#2a1018"/>
  <text x="50" y="236" text-anchor="middle" font-size="10" font-weight="700" fill="#f85149">DELETE</text>
  <text x="145" y="237" text-anchor="middle" font-size="10" fill="#8b949e">/items/:id</text>
  <text x="285" y="237" text-anchor="middle" font-size="10" fill="#e6edf3">Eliminar recurso</text>
  <text x="365" y="237" text-anchor="middle" font-size="10" fill="#f85149">204</text>

  <!-- Note: 204 = no body -->
  <text x="20" y="264" font-size="10" fill="#8b949e">* 204 = No Content (no body en la respuesta)</text>

  <!-- ===== RIGHT PANEL: Status Codes ===== -->
  <rect x="410" y="52" width="370" height="30" rx="6" fill="#161b22"/>
  <text x="595" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">Status Codes de respuesta</text>

  <!-- 2xx header -->
  <rect x="410" y="82" width="370" height="22" fill="#0d4a2a" rx="4"/>
  <text x="595" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#68A063">2xx — Éxito</text>

  <!-- 200 -->
  <rect x="410" y="104" width="370" height="24" fill="#0d1117" rx="2"/>
  <text x="450" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#68A063">200</text>
  <text x="590" y="120" text-anchor="start" font-size="10" fill="#e6edf3">OK — GET exitoso, PUT exitoso</text>

  <!-- 201 -->
  <rect x="410" y="128" width="370" height="24" fill="#0d1117" rx="2"/>
  <rect x="410" y="128" width="370" height="24" fill="none" stroke="#21262d" stroke-width="0.5"/>
  <text x="450" y="144" text-anchor="middle" font-size="11" font-weight="700" fill="#68A063">201</text>
  <text x="590" y="144" text-anchor="start" font-size="10" fill="#e6edf3">Created — POST exitoso</text>

  <!-- 204 -->
  <rect x="410" y="152" width="370" height="24" fill="#0d1117" rx="2"/>
  <rect x="410" y="152" width="370" height="24" fill="none" stroke="#21262d" stroke-width="0.5"/>
  <text x="450" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#68A063">204</text>
  <text x="590" y="168" text-anchor="start" font-size="10" fill="#e6edf3">No Content — DELETE exitoso</text>

  <!-- 4xx header -->
  <rect x="410" y="184" width="370" height="22" fill="#2a1018" rx="4"/>
  <text x="595" y="199" text-anchor="middle" font-size="11" font-weight="600" fill="#f85149">4xx — Error del cliente</text>

  <!-- 400 -->
  <rect x="410" y="206" width="370" height="24" fill="#0d1117" rx="2"/>
  <text x="450" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#f85149">400</text>
  <text x="590" y="222" text-anchor="start" font-size="10" fill="#e6edf3">Bad Request — datos inválidos</text>

  <!-- 401 -->
  <rect x="410" y="230" width="370" height="24" fill="#0d1117" rx="2"/>
  <rect x="410" y="230" width="370" height="24" fill="none" stroke="#21262d" stroke-width="0.5"/>
  <text x="450" y="246" text-anchor="middle" font-size="11" font-weight="700" fill="#f85149">401</text>
  <text x="590" y="246" text-anchor="start" font-size="10" fill="#e6edf3">Unauthorized — sin autenticación</text>

  <!-- 403 -->
  <rect x="410" y="254" width="370" height="24" fill="#0d1117" rx="2"/>
  <rect x="410" y="254" width="370" height="24" fill="none" stroke="#21262d" stroke-width="0.5"/>
  <text x="450" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#f85149">403</text>
  <text x="590" y="270" text-anchor="start" font-size="10" fill="#e6edf3">Forbidden — sin permisos</text>

  <!-- 404 -->
  <rect x="410" y="278" width="370" height="24" fill="#0d1117" rx="2"/>
  <rect x="410" y="278" width="370" height="24" fill="none" stroke="#21262d" stroke-width="0.5"/>
  <text x="450" y="294" text-anchor="middle" font-size="11" font-weight="700" fill="#f85149">404</text>
  <text x="590" y="294" text-anchor="start" font-size="10" fill="#e6edf3">Not Found — recurso no existe</text>

  <!-- 409 -->
  <rect x="410" y="302" width="370" height="24" fill="#0d1117" rx="2"/>
  <rect x="410" y="302" width="370" height="24" fill="none" stroke="#21262d" stroke-width="0.5"/>
  <text x="450" y="318" text-anchor="middle" font-size="11" font-weight="700" fill="#f85149">409</text>
  <text x="590" y="318" text-anchor="start" font-size="10" fill="#e6edf3">Conflict — email ya registrado</text>

  <!-- 5xx header -->
  <rect x="410" y="330" width="370" height="22" fill="#1a0d2b" rx="4"/>
  <text x="595" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="#bc8cff">5xx — Error del servidor</text>

  <!-- 500 -->
  <rect x="410" y="352" width="370" height="24" fill="#0d1117" rx="2"/>
  <text x="450" y="368" text-anchor="middle" font-size="11" font-weight="700" fill="#bc8cff">500</text>
  <text x="590" y="368" text-anchor="start" font-size="10" fill="#e6edf3">Internal Server Error — bug inesperado</text>

  <!-- 503 -->
  <rect x="410" y="376" width="370" height="24" fill="#0d1117" rx="2"/>
  <rect x="410" y="376" width="370" height="24" fill="none" stroke="#21262d" stroke-width="0.5"/>
  <text x="450" y="392" text-anchor="middle" font-size="11" font-weight="700" fill="#bc8cff">503</text>
  <text x="590" y="392" text-anchor="start" font-size="10" fill="#e6edf3">Service Unavailable — BD caída</text>

  <!-- ===== BOTTOM NOTE ===== -->
  <rect x="20" y="420" width="760" height="28" rx="6" fill="#161b22"/>
  <text x="400" y="433" text-anchor="middle" font-size="10" fill="#8b949e">Regla práctica: 4xx = culpa del cliente → log info  |  5xx = culpa del servidor → log error + alerta</text>
  <text x="400" y="445" text-anchor="middle" font-size="10" fill="#8b949e">401 = no sé quién eres  |  403 = sé quién eres pero no tienes permiso</text>
</svg>
