<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" width="920" height="500">
  <!-- Background -->
  <rect width="920" height="500" fill="#0d1117"/>

  <!-- Title -->
  <text x="460" y="38" font-family="Inter, Roboto, sans-serif" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">SQL vs MongoDB — Modelo de Datos</text>

  <!-- ── LEFT PANEL: SQL ── -->
  <rect x="30" y="58" width="400" height="280" rx="8" fill="#161b22" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="230" y="84" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle">PostgreSQL — Tabla relacional</text>

  <!-- Table header -->
  <rect x="50" y="95" width="360" height="28" rx="4" fill="#1e3a5f"/>
  <text x="60" y="114" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#93c5fd">products</text>
  <line x1="200" y1="95" x2="200" y2="123" stroke="#30363d" stroke-width="1"/>
  <line x1="280" y1="95" x2="280" y2="123" stroke="#30363d" stroke-width="1"/>
  <line x1="370" y1="95" x2="370" y2="123" stroke="#30363d" stroke-width="1"/>

  <!-- Column headers -->
  <text x="60" y="114" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#93c5fd">id (PK)</text>
  <text x="210" y="114" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#93c5fd">name</text>
  <text x="290" y="114" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#93c5fd">price</text>
  <text x="380" y="114" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#93c5fd">created_at</text>

  <!-- Row 1 -->
  <rect x="50" y="123" width="360" height="26" fill="#0d1117"/>
  <line x1="200" y1="123" x2="200" y2="149" stroke="#30363d" stroke-width="1"/>
  <line x1="280" y1="123" x2="280" y2="149" stroke="#30363d" stroke-width="1"/>
  <line x1="370" y1="123" x2="370" y2="149" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="140" font-family="monospace" font-size="10" fill="#a5d6a7">1</text>
  <text x="210" y="140" font-family="monospace" font-size="10" fill="#e6edf3">Camiseta Polo</text>
  <text x="290" y="140" font-family="monospace" font-size="10" fill="#ffd700">59900</text>
  <text x="380" y="140" font-family="monospace" font-size="10" fill="#8b949e">2024-01-15</text>

  <!-- Row 2 -->
  <rect x="50" y="149" width="360" height="26" fill="#161b22"/>
  <line x1="200" y1="149" x2="200" y2="175" stroke="#30363d" stroke-width="1"/>
  <line x1="280" y1="149" x2="280" y2="175" stroke="#30363d" stroke-width="1"/>
  <line x1="370" y1="149" x2="370" y2="175" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="166" font-family="monospace" font-size="10" fill="#a5d6a7">2</text>
  <text x="210" y="166" font-family="monospace" font-size="10" fill="#e6edf3">Sudadera Negra</text>
  <text x="290" y="166" font-family="monospace" font-size="10" fill="#ffd700">89900</text>
  <text x="380" y="166" font-family="monospace" font-size="10" fill="#8b949e">2024-01-16</text>

  <!-- SQL concepts -->
  <rect x="50" y="195" width="360" height="32" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="230" y="210" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Esquema fijo — ALTER TABLE para cambios</text>
  <text x="230" y="222" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Relaciones por FOREIGN KEY + JOIN</text>

  <text x="60" y="258" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#8b949e">Conceptos SQL:</text>
  <text x="60" y="276" font-family="monospace" font-size="10" fill="#58a6ff">table     →  colección estructurada</text>
  <text x="60" y="292" font-family="monospace" font-size="10" fill="#58a6ff">row       →  fila con columnas fijas</text>
  <text x="60" y="308" font-family="monospace" font-size="10" fill="#58a6ff">column    →  campo tipado en el schema</text>
  <text x="60" y="324" font-family="monospace" font-size="10" fill="#58a6ff">JOIN      →  relacionar tablas por FK</text>

  <!-- ── RIGHT PANEL: MongoDB ── -->
  <rect x="490" y="58" width="400" height="280" rx="8" fill="#161b22" stroke="#68a063" stroke-width="1.5"/>
  <text x="690" y="84" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700" fill="#68a063" text-anchor="middle">MongoDB — Documento JSON</text>

  <!-- Document box -->
  <rect x="510" y="95" width="360" height="170" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="526" y="116" font-family="monospace" font-size="11" fill="#8b949e">// collection: products</text>
  <text x="526" y="134" font-family="monospace" font-size="11" fill="#e6edf3">{</text>
  <text x="542" y="152" font-family="monospace" font-size="11"><tspan fill="#79c0ff">"_id"</tspan><tspan fill="#e6edf3">:  </tspan><tspan fill="#a5d6a7">"664abc123def456abc123def"</tspan><tspan fill="#e6edf3">,</tspan></text>
  <text x="542" y="170" font-family="monospace" font-size="11"><tspan fill="#79c0ff">"name"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#a5d6a7">"Camiseta Polo"</tspan><tspan fill="#e6edf3">,</tspan></text>
  <text x="542" y="188" font-family="monospace" font-size="11"><tspan fill="#79c0ff">"price"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#ffd700">59900</tspan><tspan fill="#e6edf3">,</tspan></text>
  <text x="542" y="206" font-family="monospace" font-size="11"><tspan fill="#79c0ff">"tags"</tspan><tspan fill="#e6edf3">:  [</tspan><tspan fill="#a5d6a7">"ropa"</tspan><tspan fill="#e6edf3">, </tspan><tspan fill="#a5d6a7">"verano"</tspan><tspan fill="#e6edf3">],</tspan></text>
  <text x="542" y="224" font-family="monospace" font-size="11"><tspan fill="#79c0ff">"active"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#ff7b72">true</tspan></text>
  <text x="526" y="242" font-family="monospace" font-size="11" fill="#e6edf3">}</text>

  <!-- MongoDB concepts -->
  <rect x="510" y="278" width="360" height="32" rx="4" fill="#1a2e1a" stroke="#68a063" stroke-width="0.5"/>
  <text x="690" y="293" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#86efac" text-anchor="middle">Schema flexible — documentos distintos en la misma colección</text>
  <text x="690" y="305" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#86efac" text-anchor="middle">Arrays y objetos anidados son de primera clase</text>

  <text x="510" y="342" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#8b949e" dx="10">Conceptos MongoDB:</text>
  <text x="520" y="360" font-family="monospace" font-size="10" fill="#68a063">collection  →  agrupación de documentos</text>
  <text x="520" y="376" font-family="monospace" font-size="10" fill="#68a063">document    →  objeto JSON / BSON</text>
  <text x="520" y="392" font-family="monospace" font-size="10" fill="#68a063">field       →  clave del documento</text>
  <text x="520" y="408" font-family="monospace" font-size="10" fill="#68a063">populate()  →  cargar documento referenciado</text>

  <!-- ── BOTTOM COMPARISON TABLE ── -->
  <rect x="30" y="360" width="860" height="28" rx="4" fill="#1e1e2e"/>
  <text x="460" y="379" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#c9d1d9" text-anchor="middle">Equivalencias SQL ↔ MongoDB</text>

  <!-- Table -->
  <rect x="30" y="390" width="860" height="100" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Header -->
  <rect x="30" y="390" width="860" height="24" rx="4" fill="#21262d"/>
  <text x="160" y="406" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#8b949e" text-anchor="middle">SQL</text>
  <text x="460" y="406" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#8b949e" text-anchor="middle">MongoDB</text>
  <text x="760" y="406" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#8b949e" text-anchor="middle">Nota</text>
  <line x1="295" y1="390" x2="295" y2="490" stroke="#30363d" stroke-width="1"/>
  <line x1="625" y1="390" x2="625" y2="490" stroke="#30363d" stroke-width="1"/>

  <line x1="30" y1="414" x2="890" y2="414" stroke="#30363d" stroke-width="1"/>
  <text x="160" y="428" font-family="monospace" font-size="10" fill="#58a6ff" text-anchor="middle">table</text>
  <text x="460" y="428" font-family="monospace" font-size="10" fill="#68a063" text-anchor="middle">collection</text>
  <text x="760" y="428" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Grupo de documentos</text>

  <line x1="30" y1="434" x2="890" y2="434" stroke="#21262d" stroke-width="1"/>
  <text x="160" y="448" font-family="monospace" font-size="10" fill="#58a6ff" text-anchor="middle">row</text>
  <text x="460" y="448" font-family="monospace" font-size="10" fill="#68a063" text-anchor="middle">document</text>
  <text x="760" y="448" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Objeto JSON/BSON</text>

  <line x1="30" y1="454" x2="890" y2="454" stroke="#21262d" stroke-width="1"/>
  <text x="160" y="468" font-family="monospace" font-size="10" fill="#58a6ff" text-anchor="middle">column</text>
  <text x="460" y="468" font-family="monospace" font-size="10" fill="#68a063" text-anchor="middle">field</text>
  <text x="760" y="468" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Clave en el documento</text>

  <line x1="30" y1="474" x2="890" y2="474" stroke="#21262d" stroke-width="1"/>
  <text x="160" y="488" font-family="monospace" font-size="10" fill="#58a6ff" text-anchor="middle">JOIN / FOREIGN KEY</text>
  <text x="460" y="488" font-family="monospace" font-size="10" fill="#68a063" text-anchor="middle">populate() + ObjectId ref</text>
  <text x="760" y="488" font-family="monospace" font-size="10" fill="#ffd700" text-anchor="middle">Sin integridad referencial</text>
</svg>
