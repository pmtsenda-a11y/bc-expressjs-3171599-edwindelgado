<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" width="920" height="480">
  <!-- Background -->
  <rect width="920" height="480" fill="#0d1117"/>

  <!-- Title -->
  <text x="460" y="36" font-family="Inter, Roboto, sans-serif" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">Mongoose — Embedding vs Referencing + populate()</text>

  <!-- ── PANEL 1: Category Collection ── -->
  <rect x="30" y="55" width="240" height="260" rx="8" fill="#161b22" stroke="#68a063" stroke-width="1.5"/>
  <rect x="30" y="55" width="240" height="34" rx="8" fill="#1a2e1a"/>
  <rect x="30" y="73" width="240" height="16" fill="#1a2e1a"/>
  <text x="150" y="77" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#68a063" text-anchor="middle">categories</text>

  <!-- Category doc 1 -->
  <rect x="46" y="102" width="208" height="82" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="120" font-family="monospace" font-size="10" fill="#e6edf3">{</text>
  <text x="60" y="136" font-family="monospace" font-size="10"><tspan fill="#79c0ff">  "_id"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#a5d6a7">"664aaa..."</tspan><tspan fill="#e6edf3">,</tspan></text>
  <text x="60" y="152" font-family="monospace" font-size="10"><tspan fill="#79c0ff">  "name"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#a5d6a7">"Ropa"</tspan></text>
  <text x="60" y="168" font-family="monospace" font-size="10" fill="#e6edf3">}</text>

  <!-- Category doc 2 -->
  <rect x="46" y="196" width="208" height="82" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="214" font-family="monospace" font-size="10" fill="#e6edf3">{</text>
  <text x="60" y="230" font-family="monospace" font-size="10"><tspan fill="#79c0ff">  "_id"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#a5d6a7">"664bbb..."</tspan><tspan fill="#e6edf3">,</tspan></text>
  <text x="60" y="246" font-family="monospace" font-size="10"><tspan fill="#79c0ff">  "name"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#a5d6a7">"Calzado"</tspan></text>
  <text x="60" y="262" font-family="monospace" font-size="10" fill="#e6edf3">}</text>

  <!-- ── REF ARROWS ── -->
  <!-- Arrow from product 1 category field to Category doc 1 -->
  <line x1="370" y1="160" x2="254" y2="143" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="254,138 248,143 254,148" fill="#ffd700"/>

  <!-- Arrow from product 2 category field to Category doc 2 -->
  <line x1="370" y1="255" x2="254" y2="238" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="254,233 248,238 254,243" fill="#ffd700"/>

  <!-- ── PANEL 2: Products Collection (with refs) ── -->
  <rect x="310" y="55" width="260" height="260" rx="8" fill="#161b22" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="310" y="55" width="260" height="34" rx="8" fill="#1e3a5f"/>
  <rect x="310" y="73" width="260" height="16" fill="#1e3a5f"/>
  <text x="440" y="77" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#3b82f6" text-anchor="middle">products (con referencia)</text>

  <!-- Product doc 1 -->
  <rect x="326" y="102" width="228" height="100" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="340" y="120" font-family="monospace" font-size="10" fill="#e6edf3">{</text>
  <text x="340" y="136" font-family="monospace" font-size="10"><tspan fill="#79c0ff">  "_id"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#a5d6a7">"664ddd..."</tspan><tspan fill="#e6edf3">,</tspan></text>
  <text x="340" y="152" font-family="monospace" font-size="10"><tspan fill="#79c0ff">  "name"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#a5d6a7">"Camiseta"</tspan><tspan fill="#e6edf3">,</tspan></text>
  <text x="340" y="168" font-family="monospace" font-size="10"><tspan fill="#79c0ff">  "category"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#ffd700">"664aaa..."</tspan></text>
  <text x="340" y="184" font-family="monospace" font-size="10" fill="#e6edf3">}</text>

  <!-- Product doc 2 -->
  <rect x="326" y="214" width="228" height="82" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="340" y="232" font-family="monospace" font-size="10" fill="#e6edf3">{</text>
  <text x="340" y="248" font-family="monospace" font-size="10"><tspan fill="#79c0ff">  "_id"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#a5d6a7">"664eee..."</tspan><tspan fill="#e6edf3">,</tspan></text>
  <text x="340" y="264" font-family="monospace" font-size="10"><tspan fill="#79c0ff">  "name"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#a5d6a7">"Zapatilla"</tspan><tspan fill="#e6edf3">, </tspan><tspan fill="#79c0ff">"category"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#ffd700">"664bbb..."</tspan></text>
  <text x="340" y="280" font-family="monospace" font-size="10" fill="#e6edf3">}</text>

  <!-- ── POPULATE ARROW ── -->
  <line x1="570" y1="185" x2="622" y2="185" stroke="#a855f7" stroke-width="2.5"/>
  <polygon points="622,180 632,185 622,190" fill="#a855f7"/>
  <text x="596" y="176" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#a855f7" text-anchor="middle">.populate(</text>
  <text x="596" y="194" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#a855f7" text-anchor="middle">'category')</text>

  <!-- ── PANEL 3: After Populate ── -->
  <rect x="632" y="55" width="258" height="260" rx="8" fill="#161b22" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="632" y="55" width="258" height="34" rx="8" fill="#2e1f05"/>
  <rect x="632" y="73" width="258" height="16" fill="#2e1f05"/>
  <text x="761" y="77" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#f59e0b" text-anchor="middle">Resultado con populate()</text>

  <!-- Populated doc -->
  <rect x="648" y="102" width="226" height="190" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="662" y="120" font-family="monospace" font-size="10" fill="#e6edf3">{</text>
  <text x="662" y="136" font-family="monospace" font-size="10"><tspan fill="#79c0ff">  "_id"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#a5d6a7">"664ddd..."</tspan><tspan fill="#e6edf3">,</tspan></text>
  <text x="662" y="152" font-family="monospace" font-size="10"><tspan fill="#79c0ff">  "name"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#a5d6a7">"Camiseta"</tspan><tspan fill="#e6edf3">,</tspan></text>
  <text x="662" y="170" font-family="monospace" font-size="10"><tspan fill="#79c0ff">  "category"</tspan><tspan fill="#e6edf3">: {</tspan></text>
  <rect x="668" y="175" width="192" height="54" rx="3" fill="#1a2e1a" stroke="#68a063" stroke-width="0.5"/>
  <text x="678" y="192" font-family="monospace" font-size="10"><tspan fill="#79c0ff">    "_id"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#a5d6a7">"664aaa..."</tspan></text>
  <text x="678" y="208" font-family="monospace" font-size="10"><tspan fill="#79c0ff">    "name"</tspan><tspan fill="#e6edf3">: </tspan><tspan fill="#a5d6a7">"Ropa"</tspan></text>
  <text x="662" y="240" font-family="monospace" font-size="10" fill="#e6edf3">  }  // ← objeto completo</text>
  <text x="662" y="278" font-family="monospace" font-size="10" fill="#e6edf3">}</text>

  <!-- ── BOTTOM SECTION ── -->
  <!-- Schema definition code -->
  <rect x="30" y="335" width="860" height="130" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="460" y="358" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#c9d1d9" text-anchor="middle">Cómo definir la referencia en el Schema</text>
  <line x1="30" y1="364" x2="890" y2="364" stroke="#30363d" stroke-width="1"/>

  <!-- Left: Schema ref definition -->
  <text x="50" y="384" font-family="monospace" font-size="10" fill="#8b949e">// En el schema del producto:</text>
  <text x="50" y="400" font-family="monospace" font-size="10"><tspan fill="#79c0ff">category</tspan><tspan fill="#e6edf3">: {</tspan></text>
  <text x="50" y="416" font-family="monospace" font-size="10"><tspan fill="#e6edf3">  type: </tspan><tspan fill="#ffa657">Schema.Types.ObjectId</tspan><tspan fill="#e6edf3">,</tspan></text>
  <text x="50" y="432" font-family="monospace" font-size="10"><tspan fill="#e6edf3">  ref: </tspan><tspan fill="#a5d6a7">'Category'</tspan><tspan fill="#e6edf3">,    </tspan><tspan fill="#8b949e">// nombre del Model</tspan></text>
  <text x="50" y="448" font-family="monospace" font-size="10"><tspan fill="#e6edf3">  required: </tspan><tspan fill="#ff7b72">true</tspan><tspan fill="#e6edf3">,</tspan></text>
  <text x="50" y="458" font-family="monospace" font-size="10" fill="#e6edf3">},</text>

  <!-- Right: Query with populate -->
  <text x="470" y="384" font-family="monospace" font-size="10" fill="#8b949e">// Query con populate:</text>
  <text x="470" y="400" font-family="monospace" font-size="10"><tspan fill="#ff7b72">const </tspan><tspan fill="#e6edf3">products = </tspan><tspan fill="#ff7b72">await</tspan></text>
  <text x="470" y="416" font-family="monospace" font-size="10"><tspan fill="#ffa657">  Product</tspan></text>
  <text x="470" y="432" font-family="monospace" font-size="10"><tspan fill="#e6edf3">    .find()</tspan></text>
  <text x="470" y="448" font-family="monospace" font-size="10"><tspan fill="#e6edf3">    .populate(</tspan><tspan fill="#a5d6a7">'category'</tspan><tspan fill="#e6edf3">)</tspan></text>
  <text x="470" y="464" font-family="monospace" font-size="10"><tspan fill="#e6edf3">    .lean();</tspan></text>

  <!-- Warning note -->
  <rect x="648" y="370" width="232" height="85" rx="4" fill="#1e1209" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="764" y="388" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#fbbf24" text-anchor="middle">⚠️  Sin integridad referencial</text>
  <text x="764" y="404" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">MongoDB no valida que el</text>
  <text x="764" y="418" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">ObjectId referenciado exista.</text>
  <text x="764" y="434" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Validar en la capa de servicio</text>
  <text x="764" y="448" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">antes de crear/actualizar.</text>
</svg>
