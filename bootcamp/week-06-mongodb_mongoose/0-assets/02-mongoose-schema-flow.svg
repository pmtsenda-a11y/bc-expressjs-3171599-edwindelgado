<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" width="920" height="460">
  <!-- Background -->
  <rect width="920" height="460" fill="#0d1117"/>

  <!-- Title -->
  <text x="460" y="36" font-family="Inter, Roboto, sans-serif" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">Mongoose — Schema → Model → Document</text>

  <!-- ── BOX 1: Define Schema ── -->
  <rect x="30" y="55" width="260" height="280" rx="8" fill="#161b22" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="30" y="55" width="260" height="34" rx="8" fill="#1e3a5f"/>
  <rect x="30" y="73" width="260" height="16" fill="#1e3a5f"/>
  <text x="160" y="77" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle">① Define Schema</text>

  <text x="50" y="115" font-family="monospace" font-size="10" fill="#8b949e">// Interfaz TypeScript</text>
  <text x="50" y="131" font-family="monospace" font-size="10"><tspan fill="#ff7b72">interface </tspan><tspan fill="#ffa657">IProduct</tspan><tspan fill="#e6edf3"> {</tspan></text>
  <text x="50" y="147" font-family="monospace" font-size="10"><tspan fill="#e6edf3">  name</tspan><tspan fill="#ff7b72">: </tspan><tspan fill="#79c0ff">string</tspan><tspan fill="#e6edf3">;</tspan></text>
  <text x="50" y="163" font-family="monospace" font-size="10"><tspan fill="#e6edf3">  price</tspan><tspan fill="#ff7b72">: </tspan><tspan fill="#79c0ff">number</tspan><tspan fill="#e6edf3">;</tspan></text>
  <text x="50" y="179" font-family="monospace" font-size="10"><tspan fill="#e6edf3">  sku</tspan><tspan fill="#ff7b72">: </tspan><tspan fill="#79c0ff">string</tspan><tspan fill="#e6edf3">;</tspan></text>
  <text x="50" y="195" font-family="monospace" font-size="10" fill="#e6edf3">}</text>

  <text x="50" y="217" font-family="monospace" font-size="10"><tspan fill="#ff7b72">const </tspan><tspan fill="#e6edf3">productSchema</tspan></text>
  <text x="50" y="233" font-family="monospace" font-size="10"><tspan fill="#e6edf3">  </tspan><tspan fill="#ff7b72">= new </tspan><tspan fill="#ffa657">Schema</tspan><tspan fill="#e6edf3">&lt;</tspan><tspan fill="#ffa657">IProduct</tspan><tspan fill="#e6edf3">&gt;({</tspan></text>
  <text x="50" y="249" font-family="monospace" font-size="10"><tspan fill="#e6edf3">  name: { </tspan><tspan fill="#79c0ff">type</tspan><tspan fill="#e6edf3">: String,</tspan></text>
  <text x="50" y="265" font-family="monospace" font-size="10"><tspan fill="#e6edf3">    required: </tspan><tspan fill="#ff7b72">true</tspan><tspan fill="#e6edf3"> },</tspan></text>
  <text x="50" y="281" font-family="monospace" font-size="10"><tspan fill="#e6edf3">  sku: { </tspan><tspan fill="#79c0ff">type</tspan><tspan fill="#e6edf3">: String,</tspan></text>
  <text x="50" y="297" font-family="monospace" font-size="10"><tspan fill="#e6edf3">    unique: </tspan><tspan fill="#ff7b72">true </tspan><tspan fill="#e6edf3">},</tspan></text>
  <text x="50" y="313" font-family="monospace" font-size="10" fill="#e6edf3">}, { timestamps: true });</text>

  <!-- Arrow 1 -->
  <line x1="290" y1="195" x2="330" y2="195" stroke="#8b949e" stroke-width="2"/>
  <polygon points="330,190 340,195 330,200" fill="#8b949e"/>

  <!-- ── BOX 2: Create Model ── -->
  <rect x="340" y="55" width="240" height="280" rx="8" fill="#161b22" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="340" y="55" width="240" height="34" rx="8" fill="#2d1b4e"/>
  <rect x="340" y="73" width="240" height="16" fill="#2d1b4e"/>
  <text x="460" y="77" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700" fill="#a855f7" text-anchor="middle">② Create Model</text>

  <text x="360" y="125" font-family="monospace" font-size="10" fill="#8b949e">// Asociar schema a colección</text>
  <text x="360" y="145" font-family="monospace" font-size="10"><tspan fill="#ff7b72">export const </tspan><tspan fill="#ffa657">Product</tspan></text>
  <text x="360" y="161" font-family="monospace" font-size="10"><tspan fill="#e6edf3">  = </tspan><tspan fill="#ffa657">model</tspan><tspan fill="#e6edf3">&lt;</tspan><tspan fill="#ffa657">IProduct</tspan><tspan fill="#e6edf3">&gt;(</tspan></text>
  <text x="360" y="177" font-family="monospace" font-size="10"><tspan fill="#a5d6a7">    'Product'</tspan><tspan fill="#e6edf3">,</tspan></text>
  <text x="360" y="193" font-family="monospace" font-size="10"><tspan fill="#e6edf3">    productSchema</tspan></text>
  <text x="360" y="209" font-family="monospace" font-size="10" fill="#e6edf3">  );</text>

  <!-- Auto-plural note -->
  <rect x="358" y="230" width="204" height="52" rx="4" fill="#1a0e2e" stroke="#a855f7" stroke-width="0.5"/>
  <text x="460" y="247" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#d8b4fe" text-anchor="middle">Nombre singular 'Product'</text>
  <text x="460" y="263" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#d8b4fe" text-anchor="middle">↓</text>
  <text x="460" y="276" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#a855f7" text-anchor="middle">colección: 'products'</text>

  <text x="360" y="316" font-family="monospace" font-size="10" fill="#8b949e">// auto-plural + lowercase</text>

  <!-- Arrow 2 -->
  <line x1="580" y1="195" x2="620" y2="195" stroke="#8b949e" stroke-width="2"/>
  <polygon points="620,190 630,195 620,200" fill="#8b949e"/>

  <!-- ── BOX 3: Use Document ── -->
  <rect x="630" y="55" width="260" height="280" rx="8" fill="#161b22" stroke="#68a063" stroke-width="1.5"/>
  <rect x="630" y="55" width="260" height="34" rx="8" fill="#1a2e1a"/>
  <rect x="630" y="73" width="260" height="16" fill="#1a2e1a"/>
  <text x="760" y="77" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700" fill="#68a063" text-anchor="middle">③ Use Document</text>

  <text x="648" y="115" font-family="monospace" font-size="10" fill="#8b949e">// CRUD Operations</text>

  <text x="648" y="135" font-family="monospace" font-size="10"><tspan fill="#8b949e">// Read all</tspan></text>
  <text x="648" y="151" font-family="monospace" font-size="10"><tspan fill="#ffa657">Product</tspan><tspan fill="#e6edf3">.find().lean()</tspan></text>

  <text x="648" y="171" font-family="monospace" font-size="10"><tspan fill="#8b949e">// Create</tspan></text>
  <text x="648" y="187" font-family="monospace" font-size="10"><tspan fill="#ffa657">Product</tspan><tspan fill="#e6edf3">.create(dto)</tspan></text>

  <text x="648" y="207" font-family="monospace" font-size="10"><tspan fill="#8b949e">// Update</tspan></text>
  <text x="648" y="223" font-family="monospace" font-size="10"><tspan fill="#ffa657">Product</tspan><tspan fill="#e6edf3">.findByIdAndUpdate(</tspan></text>
  <text x="648" y="239" font-family="monospace" font-size="10"><tspan fill="#e6edf3">  id, dto, </tspan><tspan fill="#e6edf3">{ new: </tspan><tspan fill="#ff7b72">true </tspan><tspan fill="#e6edf3">})</tspan></text>

  <text x="648" y="259" font-family="monospace" font-size="10"><tspan fill="#8b949e">// Delete</tspan></text>
  <text x="648" y="275" font-family="monospace" font-size="10"><tspan fill="#ffa657">Product</tspan><tspan fill="#e6edf3">.findByIdAndDelete(id)</tspan></text>

  <text x="648" y="295" font-family="monospace" font-size="10"><tspan fill="#8b949e">// Populate ref</tspan></text>
  <text x="648" y="311" font-family="monospace" font-size="10"><tspan fill="#ffa657">Product</tspan><tspan fill="#e6edf3">.find().populate(</tspan><tspan fill="#a5d6a7">'cat'</tspan><tspan fill="#e6edf3">)</tspan></text>

  <!-- ── BOTTOM VALIDATORS TABLE ── -->
  <rect x="30" y="355" width="860" height="95" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="460" y="376" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#c9d1d9" text-anchor="middle">Validators del Schema más utilizados</text>

  <line x1="30" y1="382" x2="890" y2="382" stroke="#30363d" stroke-width="1"/>

  <!-- Row 1 validators -->
  <text x="58" y="398" font-family="monospace" font-size="10" fill="#ffa657">required: true</text>
  <text x="215" y="398" font-family="monospace" font-size="10" fill="#ffa657">minlength: 3</text>
  <text x="372" y="398" font-family="monospace" font-size="10" fill="#ffa657">maxlength: 100</text>
  <text x="530" y="398" font-family="monospace" font-size="10" fill="#ffa657">min: 0</text>
  <text x="687" y="398" font-family="monospace" font-size="10" fill="#ffa657">max: 1000</text>

  <line x1="30" y1="405" x2="890" y2="405" stroke="#21262d" stroke-width="1"/>

  <text x="58" y="421" font-family="monospace" font-size="10" fill="#58a6ff">campo obligatorio</text>
  <text x="215" y="421" font-family="monospace" font-size="10" fill="#58a6ff">longitud mínima</text>
  <text x="372" y="421" font-family="monospace" font-size="10" fill="#58a6ff">longitud máxima</text>
  <text x="530" y="421" font-family="monospace" font-size="10" fill="#58a6ff">valor mínimo</text>
  <text x="687" y="421" font-family="monospace" font-size="10" fill="#58a6ff">valor máximo</text>

  <line x1="30" y1="427" x2="890" y2="427" stroke="#21262d" stroke-width="1"/>

  <!-- Row 2 validators -->
  <text x="58" y="443" font-family="monospace" font-size="10" fill="#ffa657">trim: true</text>
  <text x="215" y="443" font-family="monospace" font-size="10" fill="#ffa657">uppercase: true</text>
  <text x="372" y="443" font-family="monospace" font-size="10" fill="#ffa657">default: false</text>
  <text x="530" y="443" font-family="monospace" font-size="10" fill="#ffa657">unique: true</text>
  <text x="687" y="443" font-family="monospace" font-size="10" fill="#ffa657">enum: ['a','b']</text>

  <line x1="30" y1="449" x2="890" y2="449" stroke="#21262d" stroke-width="1"/>

  <text x="58" y="464" font-family="monospace" font-size="10" fill="#58a6ff">elimina espacios</text>
  <text x="215" y="464" font-family="monospace" font-size="10" fill="#58a6ff">fuerza mayúsculas</text>
  <text x="372" y="464" font-family="monospace" font-size="10" fill="#58a6ff">valor por defecto</text>
  <text x="530" y="464" font-family="monospace" font-size="10" fill="#58a6ff">índice único</text>
  <text x="687" y="464" font-family="monospace" font-size="10" fill="#58a6ff">lista de valores válidos</text>
</svg>
