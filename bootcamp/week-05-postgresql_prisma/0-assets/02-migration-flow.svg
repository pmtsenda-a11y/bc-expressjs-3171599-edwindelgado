<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="460" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#c9d1d9">Flujo de Migraciones con Prisma</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#8b949e">schema.prisma → migrate dev → SQL → PostgreSQL</text>

  <!-- Step 1: Edit schema.prisma -->
  <rect x="30" y="90" width="175" height="200" rx="10" fill="#161b22" stroke="#3b82f6" stroke-width="2"/>
  <text x="117" y="115" text-anchor="middle" font-size="12" font-weight="600" fill="#58a6ff">1. Edita schema.prisma</text>
  <line x1="48" y1="124" x2="187" y2="124" stroke="#30363d" stroke-width="1"/>
  <rect x="45" y="134" width="145" height="140" rx="5" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="117" y="152" text-anchor="middle" font-size="9" fill="#8b949e">model Product {</text>
  <text x="117" y="167" text-anchor="middle" font-size="9" fill="#93c5fd">  id   Int @id</text>
  <text x="117" y="182" text-anchor="middle" font-size="9" fill="#93c5fd">       @default(</text>
  <text x="117" y="197" text-anchor="middle" font-size="9" fill="#93c5fd">       autoincrement())</text>
  <text x="117" y="212" text-anchor="middle" font-size="9" fill="#93c5fd">  name String</text>
  <text x="117" y="227" text-anchor="middle" font-size="9" fill="#4ade80">  price Float   ← nuevo</text>
  <text x="117" y="242" text-anchor="middle" font-size="9" fill="#8b949e">}</text>
  <text x="117" y="262" text-anchor="middle" font-size="10" fill="#8b949e">Agrega / modifica campos</text>

  <!-- Arrow 1 → 2 -->
  <line x1="205" y1="190" x2="248" y2="190" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="242,185 255,190 242,195" fill="#8b949e"/>

  <!-- Step 2: prisma migrate dev -->
  <rect x="255" y="90" width="190" height="200" rx="10" fill="#161b22" stroke="#a855f7" stroke-width="2"/>
  <text x="350" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#c084fc">2. prisma migrate dev</text>
  <line x1="273" y1="122" x2="427" y2="122" stroke="#30363d" stroke-width="1"/>

  <rect x="273" y="133" width="154" height="54" rx="5" fill="#2d1b45" stroke="#7c3aed" stroke-width="1"/>
  <text x="350" y="150" text-anchor="middle" font-size="10" fill="#c4b5fd">$ pnpm dlx prisma</text>
  <text x="350" y="165" text-anchor="middle" font-size="10" fill="#c4b5fd">  migrate dev</text>
  <text x="350" y="180" text-anchor="middle" font-size="10" fill="#c4b5fd">  --name add-price</text>

  <text x="350" y="205" text-anchor="middle" font-size="11" fill="#8b949e">Prisma compara schema</text>
  <text x="350" y="220" text-anchor="middle" font-size="11" fill="#8b949e">actual vs estado DB</text>
  <text x="350" y="236" text-anchor="middle" font-size="11" fill="#8b949e">y genera el diff SQL</text>

  <rect x="273" y="252" width="154" height="28" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="350" y="267" text-anchor="middle" font-size="10" fill="#4ade80">✓ Regenera @prisma/client</text>
  <text x="350" y="279" text-anchor="middle" font-size="10" fill="#4ade80">  con tipos actualizados</text>

  <!-- Arrow 2 → 3 -->
  <line x1="445" y1="190" x2="488" y2="190" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="482,185 495,190 482,195" fill="#8b949e"/>

  <!-- Step 3: migration.sql -->
  <rect x="495" y="90" width="180" height="200" rx="10" fill="#161b22" stroke="#f59e0b" stroke-width="2"/>
  <text x="585" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#fbbf24">3. migration.sql generado</text>
  <line x1="513" y1="122" x2="657" y2="122" stroke="#30363d" stroke-width="1"/>

  <rect x="512" y="133" width="147" height="110" rx="5" fill="#1c1304" stroke="#d97706" stroke-width="1"/>
  <text x="585" y="150" text-anchor="middle" font-size="9.5" fill="#8b949e">-- migration.sql</text>
  <text x="585" y="165" text-anchor="middle" font-size="9.5" fill="#fde68a">ALTER TABLE</text>
  <text x="585" y="179" text-anchor="middle" font-size="9.5" fill="#fde68a">  "Product"</text>
  <text x="585" y="193" text-anchor="middle" font-size="9.5" fill="#fde68a">ADD COLUMN</text>
  <text x="585" y="207" text-anchor="middle" font-size="9.5" fill="#fde68a">  "price"</text>
  <text x="585" y="221" text-anchor="middle" font-size="9.5" fill="#fde68a">  DOUBLE PRECISION</text>
  <text x="585" y="235" text-anchor="middle" font-size="9.5" fill="#fde68a">  NOT NULL;</text>

  <rect x="512" y="254" width="147" height="28" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="585" y="268" text-anchor="middle" font-size="10" fill="#fb923c">⚠ No editar a mano</text>
  <text x="585" y="280" text-anchor="middle" font-size="10" fill="#8b949e">Controlar con git</text>

  <!-- Arrow 3 → 4 -->
  <line x1="675" y1="190" x2="718" y2="190" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="712,185 725,190 712,195" fill="#8b949e"/>

  <!-- Step 4: PostgreSQL -->
  <rect x="725" y="90" width="150" height="200" rx="10" fill="#161b22" stroke="#22c55e" stroke-width="2"/>
  <text x="800" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">4. PostgreSQL</text>
  <line x1="743" y1="122" x2="857" y2="122" stroke="#30363d" stroke-width="1"/>

  <rect x="743" y="133" width="114" height="26" rx="4" fill="#14230f" stroke="#16a34a" stroke-width="1"/>
  <text x="800" y="151" text-anchor="middle" font-size="10" fill="#86efac">_prisma_migrations</text>

  <rect x="743" y="166" width="114" height="26" rx="4" fill="#14230f" stroke="#16a34a" stroke-width="1"/>
  <text x="800" y="183" text-anchor="middle" font-size="10" fill="#86efac">Product</text>

  <text x="800" y="210" text-anchor="middle" font-size="10" fill="#8b949e">Tabla actualizada</text>
  <text x="800" y="226" text-anchor="middle" font-size="10" fill="#8b949e">con columna price</text>
  <text x="800" y="242" text-anchor="middle" font-size="10" fill="#8b949e">NOT NULL</text>

  <rect x="743" y="254" width="114" height="28" rx="4" fill="#14230f" stroke="#16a34a" stroke-width="1"/>
  <text x="800" y="268" text-anchor="middle" font-size="10" fill="#4ade80">✓ Schema actualizado</text>
  <text x="800" y="280" text-anchor="middle" font-size="10" fill="#4ade80">  en producción</text>

  <!-- Bottom: Migrations folder structure -->
  <rect x="30" y="315" width="840" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="338" text-anchor="middle" font-size="12" font-weight="600" fill="#c9d1d9">Estructura de prisma/migrations/ (commitear al repositorio)</text>
  <line x1="48" y1="346" x2="852" y2="346" stroke="#30363d" stroke-width="1"/>

  <text x="80" y="366" font-size="11" fill="#8b949e">prisma/</text>
  <text x="100" y="384" font-size="11" fill="#8b949e">├── schema.prisma</text>
  <text x="100" y="402" font-size="11" fill="#8b949e">└── migrations/</text>
  <text x="120" y="420" font-size="11" fill="#fbbf24">    ├── 20260101000000_init/</text>

  <text x="380" y="366" font-size="11" fill="#8b949e">migration.sql   ← SQL del snapshot inicial</text>
  <text x="380" y="384" font-size="11" fill="#fbbf24">20260108000000_add_price/</text>
  <text x="380" y="402" font-size="11" fill="#8b949e">migration.sql   ← ALTER TABLE por el nuevo campo</text>
  <text x="380" y="420" font-size="11" fill="#4ade80">migration_lock.toml   ← NO modificar manualmente</text>
</svg>
