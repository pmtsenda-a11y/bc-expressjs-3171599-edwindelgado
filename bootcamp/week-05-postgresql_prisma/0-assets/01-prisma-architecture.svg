<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="420" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#c9d1d9">Arquitectura de Prisma ORM</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#8b949e">Application → Prisma Client → Query Engine → PostgreSQL</text>

  <!-- ── Box 1: Express Application ── -->
  <rect x="30" y="90" width="180" height="240" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="120" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#58a6ff">Express App</text>
  <line x1="50" y1="124" x2="190" y2="124" stroke="#30363d" stroke-width="1"/>

  <rect x="50" y="136" width="140" height="26" rx="5" fill="#1c2128" stroke="#2d333b" stroke-width="1"/>
  <text x="120" y="154" text-anchor="middle" font-size="11" fill="#8b949e">routes/</text>

  <rect x="50" y="170" width="140" height="26" rx="5" fill="#1c2128" stroke="#2d333b" stroke-width="1"/>
  <text x="120" y="188" text-anchor="middle" font-size="11" fill="#8b949e">controllers/</text>

  <rect x="50" y="204" width="140" height="26" rx="5" fill="#1c2128" stroke="#2d333b" stroke-width="1"/>
  <text x="120" y="222" text-anchor="middle" font-size="11" fill="#8b949e">services/</text>

  <rect x="50" y="238" width="140" height="26" rx="5" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="256" text-anchor="middle" font-size="11" fill="#93c5fd">repositories/</text>

  <rect x="50" y="272" width="140" height="40" rx="5" fill="#1c2128" stroke="#2d333b" stroke-width="1"/>
  <text x="120" y="287" text-anchor="middle" font-size="10" fill="#68a063">import { prisma }</text>
  <text x="120" y="303" text-anchor="middle" font-size="10" fill="#68a063">from '../lib/prisma'</text>

  <!-- Arrow 1 → 2 -->
  <line x1="210" y1="210" x2="260" y2="210" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="235" y="202" text-anchor="middle" font-size="10" fill="#8b949e">TypeScript</text>
  <text x="235" y="222" text-anchor="middle" font-size="10" fill="#8b949e">API calls</text>

  <!-- ── Box 2: Prisma Client ── -->
  <rect x="260" y="90" width="200" height="240" rx="10" fill="#161b22" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#58a6ff">Prisma Client</text>
  <text x="360" y="132" text-anchor="middle" font-size="10" fill="#8b949e">@prisma/client</text>
  <line x1="278" y1="140" x2="442" y2="140" stroke="#30363d" stroke-width="1"/>

  <rect x="280" y="152" width="160" height="30" rx="5" fill="#1f2937" stroke="#3b82f6" stroke-width="1"/>
  <text x="360" y="171" text-anchor="middle" font-size="11" fill="#93c5fd">prisma.product.findMany()</text>

  <rect x="280" y="192" width="160" height="30" rx="5" fill="#1f2937" stroke="#3b82f6" stroke-width="1"/>
  <text x="360" y="211" text-anchor="middle" font-size="11" fill="#93c5fd">prisma.product.create()</text>

  <rect x="280" y="232" width="160" height="30" rx="5" fill="#1f2937" stroke="#3b82f6" stroke-width="1"/>
  <text x="360" y="251" text-anchor="middle" font-size="11" fill="#93c5fd">prisma.product.update()</text>

  <rect x="280" y="272" width="160" height="30" rx="5" fill="#1f2937" stroke="#3b82f6" stroke-width="1"/>
  <text x="360" y="291" text-anchor="middle" font-size="11" fill="#93c5fd">prisma.product.delete()</text>

  <!-- Type generation note -->
  <rect x="280" y="312" width="160" height="28" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="326" text-anchor="middle" font-size="10" fill="#8b949e">Types generated from</text>
  <text x="360" y="338" text-anchor="middle" font-size="10" fill="#68a063">schema.prisma ✓</text>

  <!-- Arrow 2 → 3 -->
  <line x1="460" y1="210" x2="510" y2="210" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="485" y="202" text-anchor="middle" font-size="10" fill="#8b949e">SQL</text>
  <text x="485" y="222" text-anchor="middle" font-size="10" fill="#8b949e">queries</text>

  <!-- ── Box 3: Query Engine ── -->
  <rect x="510" y="90" width="170" height="240" rx="10" fill="#161b22" stroke="#a855f7" stroke-width="2"/>
  <text x="595" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#c084fc">Query Engine</text>
  <text x="595" y="132" text-anchor="middle" font-size="10" fill="#8b949e">Rust Binary</text>
  <line x1="528" y1="140" x2="662" y2="140" stroke="#30363d" stroke-width="1"/>

  <rect x="530" y="155" width="130" height="30" rx="5" fill="#2d1b45" stroke="#7c3aed" stroke-width="1"/>
  <text x="595" y="175" text-anchor="middle" font-size="11" fill="#c4b5fd">AST Parsing</text>

  <rect x="530" y="195" width="130" height="30" rx="5" fill="#2d1b45" stroke="#7c3aed" stroke-width="1"/>
  <text x="595" y="215" text-anchor="middle" font-size="11" fill="#c4b5fd">SQL Generation</text>

  <rect x="530" y="235" width="130" height="30" rx="5" fill="#2d1b45" stroke="#7c3aed" stroke-width="1"/>
  <text x="595" y="255" text-anchor="middle" font-size="11" fill="#c4b5fd">Connection Pool</text>

  <rect x="530" y="275" width="130" height="30" rx="5" fill="#2d1b45" stroke="#7c3aed" stroke-width="1"/>
  <text x="595" y="295" text-anchor="middle" font-size="11" fill="#c4b5fd">Result Mapping</text>

  <!-- Arrow 3 → 4 -->
  <line x1="680" y1="210" x2="730" y2="210" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="705" y="202" text-anchor="middle" font-size="10" fill="#8b949e">TCP</text>
  <text x="705" y="222" text-anchor="middle" font-size="10" fill="#8b949e">5432</text>

  <!-- ── Box 4: PostgreSQL ── -->
  <rect x="730" y="90" width="150" height="240" rx="10" fill="#161b22" stroke="#22c55e" stroke-width="2"/>
  <text x="805" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#4ade80">PostgreSQL</text>
  <text x="805" y="132" text-anchor="middle" font-size="10" fill="#8b949e">:5432</text>
  <line x1="748" y1="140" x2="862" y2="140" stroke="#30363d" stroke-width="1"/>

  <rect x="750" y="155" width="110" height="30" rx="5" fill="#14230f" stroke="#16a34a" stroke-width="1"/>
  <text x="805" y="175" text-anchor="middle" font-size="11" fill="#86efac">products</text>

  <rect x="750" y="195" width="110" height="30" rx="5" fill="#14230f" stroke="#16a34a" stroke-width="1"/>
  <text x="805" y="215" text-anchor="middle" font-size="11" fill="#86efac">categories</text>

  <rect x="750" y="235" width="110" height="30" rx="5" fill="#14230f" stroke="#16a34a" stroke-width="1"/>
  <text x="805" y="255" text-anchor="middle" font-size="11" fill="#86efac">orders</text>

  <rect x="750" y="275" width="110" height="30" rx="5" fill="#14230f" stroke="#16a34a" stroke-width="1"/>
  <text x="805" y="295" text-anchor="middle" font-size="11" fill="#86efac">migrations</text>

  <!-- Bottom note -->
  <rect x="30" y="350" width="840" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="370" text-anchor="middle" font-size="11" fill="#8b949e">El Prisma Client es type-safe: los tipos TypeScript se generan automáticamente desde</text>
  <text x="450" y="388" text-anchor="middle" font-size="11" fill="#58a6ff">schema.prisma → pnpm dlx prisma generate → @prisma/client</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
