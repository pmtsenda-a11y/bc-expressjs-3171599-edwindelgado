<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="480" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#c9d1d9">Relaciones en Prisma — 1:N y N:M</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#8b949e">@relation, include y tabla intermedia en schema.prisma</text>

  <!-- ═══════════════════ LEFT: 1:N ═══════════════════ -->
  <rect x="30" y="75" width="390" height="365" rx="10" fill="#161b22" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="225" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#58a6ff">Relación 1:N — Una categoría → muchos productos</text>
  <line x1="48" y1="110" x2="402" y2="110" stroke="#30363d" stroke-width="1"/>

  <!-- Category box -->
  <rect x="48" y="120" width="155" height="140" rx="8" fill="#1c2128" stroke="#22c55e" stroke-width="2"/>
  <rect x="48" y="120" width="155" height="28" rx="8" fill="#14230f" stroke="#22c55e" stroke-width="2"/>
  <text x="125" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">Category</text>
  <text x="68" y="162" font-size="10" fill="#86efac">id       Int  @id</text>
  <text x="68" y="177" font-size="10" fill="#86efac">name     String @unique</text>
  <text x="68" y="192" font-size="10" fill="#8b949e">products Product[]</text>
  <text x="68" y="207" font-size="10" fill="#8b949e">         (virtual)</text>
  <text x="68" y="222" font-size="10" fill="#8b949e">createdAt DateTime</text>

  <!-- Arrow 1:N -->
  <line x1="203" y1="185" x2="240" y2="185" stroke="#3b82f6" stroke-width="2"/>
  <text x="221" y="176" text-anchor="middle" font-size="11" fill="#93c5fd">1</text>
  <text x="221" y="198" text-anchor="middle" font-size="9" fill="#8b949e">tiene</text>
  <line x1="240" y1="185" x2="255" y2="185" stroke="#3b82f6" stroke-width="2"/>
  <!-- crow's foot (many) -->
  <line x1="254" y1="178" x2="265" y2="185" stroke="#3b82f6" stroke-width="2"/>
  <line x1="254" y1="192" x2="265" y2="185" stroke="#3b82f6" stroke-width="2"/>
  <line x1="260" y1="185" x2="268" y2="185" stroke="#3b82f6" stroke-width="2"/>
  <text x="280" y="176" text-anchor="middle" font-size="11" fill="#93c5fd">N</text>

  <!-- Product box -->
  <rect x="268" y="120" width="140" height="165" rx="8" fill="#1c2128" stroke="#3b82f6" stroke-width="2"/>
  <rect x="268" y="120" width="140" height="28" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="2"/>
  <text x="338" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#58a6ff">Product</text>
  <text x="283" y="163" font-size="10" fill="#93c5fd">id       Int  @id</text>
  <text x="283" y="178" font-size="10" fill="#93c5fd">name     String</text>
  <text x="283" y="193" font-size="10" fill="#93c5fd">price    Float</text>
  <text x="283" y="208" font-size="10" fill="#fbbf24">category   Category</text>
  <text x="283" y="221" font-size="10" fill="#fbbf24">  @relation(</text>
  <text x="283" y="234" font-size="10" fill="#fbbf24">    fields:[categoryId]</text>
  <text x="283" y="247" font-size="10" fill="#fbbf24">    references:[id])</text>
  <text x="283" y="263" font-size="10" fill="#fb923c">categoryId Int  ← FK</text>
  <text x="283" y="276" font-size="10" fill="#8b949e">createdAt DateTime</text>

  <!-- Include query example -->
  <rect x="48" y="278" width="360" height="150" rx="6" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="228" y="298" text-anchor="middle" font-size="11" font-weight="600" fill="#c9d1d9">Consulta con include</text>
  <text x="68" y="317" font-size="10" fill="#8b949e">// Producto con su categoría (1 sola query SQL)</text>
  <text x="68" y="333" font-size="10" fill="#ec4899">const</text>
  <text x="100" y="333" font-size="10" fill="#c9d1d9">product = await prisma.product.findUnique({</text>
  <text x="78" y="349" font-size="10" fill="#c9d1d9">  where: { id: 1 },</text>
  <text x="78" y="365" font-size="10" fill="#fbbf24">  include: { category: true },</text>
  <text x="68" y="381" font-size="10" fill="#c9d1d9">});</text>
  <text x="68" y="398" font-size="10" fill="#8b949e">// Tipo: Product &amp; { category: Category | null }</text>
  <text x="68" y="414" font-size="10" fill="#4ade80">// ✓ NO es N+1 — Prisma genera un JOIN</text>

  <!-- ═══════════════════ RIGHT: N:M ═══════════════════ -->
  <rect x="460" y="75" width="415" height="365" rx="10" fill="#161b22" stroke="#a855f7" stroke-width="1.5"/>
  <text x="667" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#c084fc">Relación N:M — Pedidos y Productos</text>
  <line x1="478" y1="110" x2="857" y2="110" stroke="#30363d" stroke-width="1"/>

  <!-- Order box -->
  <rect x="478" y="120" width="130" height="100" rx="8" fill="#1c2128" stroke="#a855f7" stroke-width="2"/>
  <rect x="478" y="120" width="130" height="28" rx="8" fill="#2d1b45" stroke="#a855f7" stroke-width="2"/>
  <text x="543" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#c084fc">Order</text>
  <text x="493" y="163" font-size="10" fill="#c4b5fd">id        Int @id</text>
  <text x="493" y="178" font-size="10" fill="#c4b5fd">createdAt DateTime</text>
  <text x="493" y="193" font-size="10" fill="#8b949e">items OrderItem[]</text>
  <text x="493" y="207" font-size="10" fill="#8b949e">       (virtual)</text>

  <!-- Arrow order → orderitem -->
  <line x1="608" y1="170" x2="648" y2="170" stroke="#a855f7" stroke-width="2"/>
  <text x="625" y="162" text-anchor="middle" font-size="10" fill="#c084fc">1</text>
  <line x1="646" y1="163" x2="658" y2="170" stroke="#a855f7" stroke-width="2"/>
  <line x1="646" y1="177" x2="658" y2="170" stroke="#a855f7" stroke-width="2"/>

  <!-- OrderItem box (join table) -->
  <rect x="658" y="120" width="150" height="165" rx="8" fill="#1c2128" stroke="#f59e0b" stroke-width="2.5"/>
  <rect x="658" y="120" width="150" height="28" rx="8" fill="#1c1304" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="733" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#fbbf24">OrderItem</text>
  <text x="673" y="163" font-size="10" fill="#fde68a">id        Int @id</text>
  <text x="673" y="178" font-size="10" fill="#fde68a">quantity  Int @default(1)</text>
  <text x="673" y="193" font-size="10" fill="#fb923c">order     Order @relation</text>
  <text x="673" y="207" font-size="10" fill="#fb923c">orderId   Int  ← FK</text>
  <text x="673" y="222" font-size="10" fill="#fb923c">product   Product @relation</text>
  <text x="673" y="237" font-size="10" fill="#fb923c">productId Int  ← FK</text>
  <text x="673" y="254" font-size="10" fill="#8b949e">@@unique([orderId, productId])</text>
  <text x="673" y="269" font-size="10" fill="#8b949e">← evita duplicados</text>

  <!-- Arrow orderitem → product -->
  <line x1="808" y1="170" x2="845" y2="170" stroke="#a855f7" stroke-width="2"/>
  <text x="826" y="162" text-anchor="middle" font-size="10" fill="#c084fc">N</text>
  <text x="826" y="186" text-anchor="middle" font-size="10" fill="#8b949e">→</text>

  <!-- Product box right -->
  <rect x="808" y="120" width="52" height="2" fill="none"/>
  <text x="845" y="175" font-size="11" fill="#58a6ff">Product</text>

  <!-- N:M include example -->
  <rect x="478" y="300" width="375" height="130" rx="6" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="665" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#c9d1d9">Consulta anidada con include</text>
  <text x="493" y="340" font-size="10" fill="#8b949e">// Pedido con items y cada producto (2 JOINs, 1 query)</text>
  <text x="493" y="357" font-size="10" fill="#ec4899">const</text>
  <text x="524" y="357" font-size="10" fill="#c9d1d9">order = await prisma.order.findUnique({</text>
  <text x="508" y="373" font-size="10" fill="#c9d1d9">  where: { id: 1 },</text>
  <text x="508" y="389" font-size="10" fill="#fbbf24">  include: {</text>
  <text x="508" y="403" font-size="10" fill="#fbbf24">    items: { include: { product: true } },</text>
  <text x="508" y="417" font-size="10" fill="#fbbf24">  },</text>
  <text x="493" y="431" font-size="10" fill="#8b949e">// Tipo: Order &amp; { items: (OrderItem &amp; { product: Product })[] }</text>

  <!-- Bottom label -->
  <text x="450" y="460" text-anchor="middle" font-size="11" fill="#8b949e">La tabla intermedia explícita (OrderItem) permite añadir campos extra a la relación (quantity, priceAtTime, etc.)</text>
</svg>
