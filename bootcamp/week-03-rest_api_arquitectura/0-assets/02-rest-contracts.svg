<svg width="800" height="460" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="460" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#e6edf3">Contratos REST — Estructura de Respuestas</text>

  <!-- ===== REQUEST SIDE ===== -->
  <rect x="20" y="52" width="355" height="30" rx="6" fill="#161b22"/>
  <text x="197" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">Petición → Ruta RESTful</text>

  <!-- Rutas table -->
  <rect x="20" y="82" width="355" height="24" fill="#21262d" rx="4"/>
  <text x="80" y="98" text-anchor="middle" font-size="10" font-weight="600" fill="#8b949e">VERBO</text>
  <text x="220" y="98" text-anchor="middle" font-size="10" font-weight="600" fill="#8b949e">RUTA</text>
  <text x="340" y="98" text-anchor="middle" font-size="10" font-weight="600" fill="#8b949e">STATUS</text>

  <!-- GET /items -->
  <rect x="20" y="106" width="355" height="26" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <rect x="26" y="111" width="50" height="14" rx="3" fill="#0d4a2a"/>
  <text x="51" y="122" text-anchor="middle" font-size="9" font-weight="700" fill="#68A063">GET</text>
  <text x="220" y="123" text-anchor="middle" font-size="10" fill="#8b949e">/api/v1/items?page=1&amp;limit=10</text>
  <text x="340" y="123" text-anchor="middle" font-size="10" fill="#68A063">200</text>

  <!-- GET /items/:id -->
  <rect x="20" y="132" width="355" height="26" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <rect x="26" y="137" width="50" height="14" rx="3" fill="#0d4a2a"/>
  <text x="51" y="148" text-anchor="middle" font-size="9" font-weight="700" fill="#68A063">GET</text>
  <text x="220" y="149" text-anchor="middle" font-size="10" fill="#8b949e">/api/v1/items/:id</text>
  <text x="340" y="149" text-anchor="middle" font-size="10" fill="#68A063">200 / 404</text>

  <!-- POST /items -->
  <rect x="20" y="158" width="355" height="26" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <rect x="26" y="163" width="50" height="14" rx="3" fill="#192840"/>
  <text x="51" y="174" text-anchor="middle" font-size="9" font-weight="700" fill="#58a6ff">POST</text>
  <text x="220" y="175" text-anchor="middle" font-size="10" fill="#8b949e">/api/v1/items</text>
  <text x="340" y="175" text-anchor="middle" font-size="10" fill="#58a6ff">201</text>

  <!-- PUT /items/:id -->
  <rect x="20" y="184" width="355" height="26" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <rect x="26" y="189" width="50" height="14" rx="3" fill="#2d1f04"/>
  <text x="51" y="200" text-anchor="middle" font-size="9" font-weight="700" fill="#e3b341">PUT</text>
  <text x="220" y="201" text-anchor="middle" font-size="10" fill="#8b949e">/api/v1/items/:id</text>
  <text x="340" y="201" text-anchor="middle" font-size="10" fill="#e3b341">200 / 404</text>

  <!-- DELETE /items/:id -->
  <rect x="20" y="210" width="355" height="26" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <rect x="26" y="215" width="50" height="14" rx="3" fill="#2a1018"/>
  <text x="51" y="226" text-anchor="middle" font-size="9" font-weight="700" fill="#f85149">DELETE</text>
  <text x="220" y="227" text-anchor="middle" font-size="10" fill="#8b949e">/api/v1/items/:id</text>
  <text x="340" y="227" text-anchor="middle" font-size="10" fill="#f85149">204 / 404</text>

  <!-- Versioning note -->
  <rect x="20" y="242" width="355" height="30" rx="6" fill="#0d4a2a" stroke="#68A063" stroke-width="1"/>
  <text x="197" y="257" text-anchor="middle" font-size="10" font-weight="600" fill="#68A063">Siempre versionar: /api/v1/</text>
  <text x="197" y="267" text-anchor="middle" font-size="9" fill="#a5d6a7">Permite evolucionar la API sin romper clientes existentes</text>

  <!-- ===== DIVIDER ===== -->
  <line x1="390" y1="60" x2="390" y2="408" stroke="#21262d" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ===== RESPONSE SIDE ===== -->
  <rect x="410" y="52" width="370" height="30" rx="6" fill="#161b22"/>
  <text x="595" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">Respuesta → Contrato JSON</text>

  <!-- Single resource -->
  <rect x="410" y="82" width="370" height="20" fill="#192840" rx="4"/>
  <text x="595" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#58a6ff">GET /items/:id → 200 (recurso único)</text>

  <rect x="410" y="102" width="370" height="52" fill="#0d1117" stroke="#192840" stroke-width="0.5" rx="2"/>
  <text x="424" y="117" font-size="10" fill="#e3b341">{"data":</text>
  <text x="450" y="131" font-size="10" fill="#e6edf3">{"id": 1, "name": "Laptop", "price": 1299.99}}</text>

  <!-- Paginated list -->
  <rect x="410" y="160" width="370" height="20" fill="#0d4a2a" rx="4"/>
  <text x="595" y="174" text-anchor="middle" font-size="10" font-weight="600" fill="#68A063">GET /items → 200 (listado paginado)</text>

  <rect x="410" y="180" width="370" height="78" fill="#0d1117" stroke="#0d4a2a" stroke-width="0.5" rx="2"/>
  <text x="424" y="195" font-size="10" fill="#e3b341">{"data":</text>
  <text x="450" y="209" font-size="10" fill="#e6edf3">[{"id":1, "name":"Laptop"}, ...],</text>
  <text x="424" y="223" font-size="10" fill="#e3b341">"total": 47, "page": 1, "limit": 10}</text>
  <text x="424" y="250" font-size="9" fill="#8b949e">← metadatos de paginación siempre presentes</text>

  <!-- Error response -->
  <rect x="410" y="264" width="370" height="20" fill="#2a1018" rx="4"/>
  <text x="595" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#f85149">GET /items/999 → 404 (error)</text>

  <rect x="410" y="284" width="370" height="52" fill="#0d1117" stroke="#2a1018" stroke-width="0.5" rx="2"/>
  <text x="424" y="299" font-size="10" fill="#e3b341">{"error":</text>
  <text x="480" y="299" font-size="10" fill="#e6edf3">"Not Found",</text>
  <text x="424" y="313" font-size="10" fill="#e3b341">"message":</text>
  <text x="492" y="313" font-size="10" fill="#e6edf3">"Item with id 999 not found"}</text>

  <!-- Creation response -->
  <rect x="410" y="340" width="370" height="20" fill="#192840" rx="4"/>
  <text x="595" y="354" text-anchor="middle" font-size="10" font-weight="600" fill="#58a6ff">POST /items → 201 (creado)</text>

  <rect x="410" y="360" width="370" height="38" fill="#0d1117" stroke="#192840" stroke-width="0.5" rx="2"/>
  <text x="424" y="375" font-size="10" fill="#e3b341">{"data":</text>
  <text x="450" y="375" font-size="10" fill="#e6edf3">{"id": 48, "name": "Monitor", "price": 399.99}}</text>
  <text x="424" y="392" font-size="9" fill="#8b949e">← 201, no 200. El recurso creado en data</text>

  <!-- ===== BOTTOM RULE ===== -->
  <rect x="20" y="416" width="760" height="32" rx="6" fill="#161b22"/>
  <text x="400" y="430" text-anchor="middle" font-size="11" font-weight="600" fill="#e6edf3">Regla del contrato: nunca cambiar la estructura de una respuesta sin cambiar la versión de la API</text>
  <text x="400" y="444" text-anchor="middle" font-size="10" fill="#8b949e">Los clientes dependen de la forma exacta de las respuestas — un cambio rompe la integración</text>
</svg>
