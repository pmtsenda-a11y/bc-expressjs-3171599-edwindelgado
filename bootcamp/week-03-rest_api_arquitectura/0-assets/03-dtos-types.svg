<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#e6edf3">DTOs y Tipos TypeScript</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#8b949e">Cada operación tiene su propio tipo: nunca reutilizar la entidad completa como input</text>

  <!-- ===== CENTER: DB ENTITY ===== -->
  <rect x="295" y="75" width="210" height="145" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <rect x="295" y="75" width="210" height="28" rx="8" fill="#f0883e"/>
  <rect x="295" y="88" width="210" height="15" rx="2" fill="#f0883e"/>
  <text x="400" y="94" text-anchor="middle" font-size="12" font-weight="700" fill="#0d1117">Product (entidad BD)</text>
  <text x="310" y="121" font-size="10" fill="#e6edf3">id: number</text>
  <text x="310" y="136" font-size="10" fill="#e6edf3">name: string</text>
  <text x="310" y="151" font-size="10" fill="#e6edf3">price: number</text>
  <text x="310" y="166" font-size="10" fill="#e6edf3">stock: number</text>
  <text x="310" y="181" font-size="10" fill="#8b949e">createdAt: Date   ← generado</text>
  <text x="310" y="196" font-size="10" fill="#8b949e">updatedAt: Date   ← generado</text>

  <!-- ===== LEFT: CreateProductDto ===== -->
  <rect x="30" y="75" width="200" height="130" rx="8" fill="#192840" stroke="#58a6ff" stroke-width="2"/>
  <rect x="30" y="75" width="200" height="28" rx="8" fill="#58a6ff"/>
  <rect x="30" y="88" width="200" height="15" rx="2" fill="#58a6ff"/>
  <text x="130" y="94" text-anchor="middle" font-size="11" font-weight="700" fill="#0d1117">CreateProductDto</text>
  <text x="130" y="113" text-anchor="middle" font-size="9" fill="#a8c8f8">Omit&lt;Product, 'id' | 'createdAt'...</text>
  <text x="46" y="131" font-size="10" fill="#e6edf3">name: string</text>
  <text x="46" y="146" font-size="10" fill="#e6edf3">price: number</text>
  <text x="46" y="161" font-size="10" fill="#e6edf3">stock: number</text>
  <text x="46" y="180" font-size="9" fill="#8b949e">Sin id ni timestamps</text>

  <!-- Arrow: CreateDto → Entity (POST creates) -->
  <line x1="230" y1="120" x2="292" y2="120" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#aw4-b)"/>
  <text x="261" y="113" text-anchor="middle" font-size="9" fill="#58a6ff">POST →</text>
  <text x="261" y="135" text-anchor="middle" font-size="9" fill="#8b949e">repo agrega id</text>

  <!-- ===== RIGHT: UpdateProductDto ===== -->
  <rect x="570" y="75" width="200" height="130" rx="8" fill="#2d1f04" stroke="#e3b341" stroke-width="2"/>
  <rect x="570" y="75" width="200" height="28" rx="8" fill="#e3b341"/>
  <rect x="570" y="88" width="200" height="15" rx="2" fill="#e3b341"/>
  <text x="670" y="94" text-anchor="middle" font-size="11" font-weight="700" fill="#0d1117">UpdateProductDto</text>
  <text x="670" y="113" text-anchor="middle" font-size="9" fill="#b8920a">Partial&lt;CreateProductDto&gt;</text>
  <text x="586" y="131" font-size="10" fill="#e6edf3">name?: string</text>
  <text x="586" y="146" font-size="10" fill="#e6edf3">price?: number</text>
  <text x="586" y="161" font-size="10" fill="#e6edf3">stock?: number</text>
  <text x="586" y="180" font-size="9" fill="#8b949e">Todos los campos opcionales</text>

  <!-- Arrow: entity → UpdateDto (PUT uses) -->
  <line x1="505" y1="130" x2="568" y2="130" stroke="#e3b341" stroke-width="1.5" marker-end="url(#aw4-y)"/>
  <text x="537" y="122" text-anchor="middle" font-size="9" fill="#e3b341">PUT →</text>

  <!-- ===== BOTTOM: ProductResponse ===== -->
  <rect x="200" y="270" width="400" height="100" rx="8" fill="#0d4a2a" stroke="#68A063" stroke-width="2"/>
  <rect x="200" y="270" width="400" height="28" rx="8" fill="#68A063"/>
  <rect x="200" y="283" width="400" height="15" rx="2" fill="#68A063"/>
  <text x="400" y="289" text-anchor="middle" font-size="12" font-weight="700" fill="#0d1117">ProductResponse (para el cliente)</text>
  <text x="400" y="312" text-anchor="middle" font-size="9" fill="#a5d6a7">Omit&lt;Product, 'password' | campos internos&gt;</text>
  <text x="216" y="330" font-size="10" fill="#e6edf3">id: number | name: string | price: number | stock: number</text>
  <text x="400" y="354" text-anchor="middle" font-size="9" fill="#68A063">Nunca exponer campos sensibles al cliente</text>

  <!-- Arrow: entity → response (GET returns) -->
  <line x1="370" y1="220" x2="360" y2="268" stroke="#68A063" stroke-width="1.5" marker-end="url(#aw4-g)"/>
  <text x="340" y="250" text-anchor="middle" font-size="9" fill="#68A063">GET →</text>

  <!-- ===== UTILITY TYPES LEGEND ===== -->
  <rect x="20" y="382" width="760" height="26" rx="6" fill="#161b22"/>
  <text x="100" y="399" text-anchor="middle" font-size="10" font-weight="600" fill="#58a6ff">Omit&lt;T, K&gt;</text>
  <text x="220" y="399" text-anchor="middle" font-size="10" fill="#8b949e">excluye claves K de T</text>
  <text x="360" y="399" text-anchor="middle" font-size="10" font-weight="600" fill="#e3b341">Partial&lt;T&gt;</text>
  <text x="470" y="399" text-anchor="middle" font-size="10" fill="#8b949e">hace todos los campos opcionales</text>
  <text x="610" y="399" text-anchor="middle" font-size="10" font-weight="600" fill="#bc8cff">Pick&lt;T, K&gt;</text>
  <text x="720" y="399" text-anchor="middle" font-size="10" fill="#8b949e">selecciona solo claves K</text>

  <!-- Defs -->
  <defs>
    <marker id="aw4-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#68A063"/>
    </marker>
    <marker id="aw4-b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="aw4-y" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e3b341"/>
    </marker>
  </defs>
</svg>
