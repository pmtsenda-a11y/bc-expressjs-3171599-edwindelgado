<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="480" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#e6edf3">Arquitectura en Capas — Express API</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#8b949e">Cada capa tiene una única responsabilidad y se comunica solo con la capa adyacente</text>

  <!-- ===== CLIENT ===== -->
  <rect x="30" y="80" width="100" height="44" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="80" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#e6edf3">Cliente</text>
  <text x="80" y="116" text-anchor="middle" font-size="10" fill="#8b949e">HTTP req/res</text>

  <!-- Arrow: client ↔ routes -->
  <line x1="130" y1="102" x2="168" y2="102" stroke="#68A063" stroke-width="2" marker-end="url(#aw3-g)"/>
  <line x1="168" y1="110" x2="130" y2="110" stroke="#8b949e" stroke-width="1.5" marker-end="url(#aw3-gray)"/>

  <!-- ===== LAYER 1: ROUTES ===== -->
  <rect x="168" y="70" width="130" height="64" rx="8" fill="#0d4a2a" stroke="#68A063" stroke-width="2"/>
  <text x="233" y="93" text-anchor="middle" font-size="12" font-weight="700" fill="#68A063">Routes</text>
  <text x="233" y="110" text-anchor="middle" font-size="10" fill="#a5d6a7">routes/</text>
  <text x="233" y="124" text-anchor="middle" font-size="10" fill="#a5d6a7">Mapea URL+verbo → controller</text>

  <!-- Arrow: routes → controllers -->
  <line x1="298" y1="102" x2="336" y2="102" stroke="#68A063" stroke-width="2" marker-end="url(#aw3-g)"/>
  <line x1="336" y1="110" x2="298" y2="110" stroke="#8b949e" stroke-width="1.5" marker-end="url(#aw3-gray)"/>

  <!-- ===== LAYER 2: CONTROLLERS ===== -->
  <rect x="336" y="70" width="130" height="64" rx="8" fill="#192840" stroke="#58a6ff" stroke-width="2"/>
  <text x="401" y="93" text-anchor="middle" font-size="12" font-weight="700" fill="#58a6ff">Controllers</text>
  <text x="401" y="110" text-anchor="middle" font-size="10" fill="#a8c8f8">controllers/</text>
  <text x="401" y="124" text-anchor="middle" font-size="10" fill="#a8c8f8">Lee req, delega, escribe res</text>

  <!-- Arrow: controllers → services -->
  <line x1="466" y1="102" x2="504" y2="102" stroke="#58a6ff" stroke-width="2" marker-end="url(#aw3-b)"/>
  <line x1="504" y1="110" x2="466" y2="110" stroke="#8b949e" stroke-width="1.5" marker-end="url(#aw3-gray)"/>

  <!-- ===== LAYER 3: SERVICES ===== -->
  <rect x="504" y="70" width="130" height="64" rx="8" fill="#2d1a3a" stroke="#bc8cff" stroke-width="2"/>
  <text x="569" y="93" text-anchor="middle" font-size="12" font-weight="700" fill="#bc8cff">Services</text>
  <text x="569" y="110" text-anchor="middle" font-size="10" fill="#d2b4ff">services/</text>
  <text x="569" y="124" text-anchor="middle" font-size="10" fill="#d2b4ff">Lógica de negocio pura</text>

  <!-- Arrow: services → repositories -->
  <line x1="634" y1="102" x2="666" y2="102" stroke="#bc8cff" stroke-width="2" marker-end="url(#aw3-pu)"/>
  <line x1="666" y1="110" x2="634" y2="110" stroke="#8b949e" stroke-width="1.5" marker-end="url(#aw3-gray)"/>

  <!-- ===== LAYER 4: REPOSITORIES ===== -->
  <rect x="666" y="70" width="110" height="64" rx="8" fill="#2a1018" stroke="#f0883e" stroke-width="2"/>
  <text x="721" y="93" text-anchor="middle" font-size="12" font-weight="700" fill="#f0883e">Repositories</text>
  <text x="721" y="110" text-anchor="middle" font-size="10" fill="#ffc5a0">repositories/</text>
  <text x="721" y="124" text-anchor="middle" font-size="10" fill="#ffc5a0">Acceso a datos</text>

  <!-- ===== DATA STORE ===== -->
  <rect x="666" y="170" width="110" height="44" rx="8" fill="#1a1006" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="721" y="191" text-anchor="middle" font-size="11" fill="#f0883e">Store / DB</text>
  <text x="721" y="207" text-anchor="middle" font-size="10" fill="#8b949e">Array / Prisma</text>
  <!-- Arrow repo → store -->
  <line x1="721" y1="134" x2="721" y2="170" stroke="#f0883e" stroke-width="1.5" marker-end="url(#aw3-o)"/>

  <!-- ===== RESPONSIBILITIES TABLE ===== -->
  <rect x="30" y="240" width="740" height="210" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">Responsabilidades por capa</text>

  <!-- Row headers -->
  <rect x="42" y="272" width="130" height="22" rx="4" fill="#21262d"/>
  <text x="107" y="287" text-anchor="middle" font-size="10" font-weight="600" fill="#8b949e">CAPA</text>
  <rect x="182" y="272" width="160" height="22" rx="4" fill="#21262d"/>
  <text x="262" y="287" text-anchor="middle" font-size="10" font-weight="600" fill="#8b949e">SABE DE</text>
  <rect x="352" y="272" width="200" height="22" rx="4" fill="#21262d"/>
  <text x="452" y="287" text-anchor="middle" font-size="10" font-weight="600" fill="#8b949e">RESPONSABILIDAD</text>
  <rect x="562" y="272" width="200" height="22" rx="4" fill="#21262d"/>
  <text x="662" y="287" text-anchor="middle" font-size="10" font-weight="600" fill="#8b949e">NO DEBE</text>

  <!-- Routes row -->
  <text x="107" y="311" text-anchor="middle" font-size="11" font-weight="600" fill="#68A063">Routes</text>
  <text x="262" y="311" text-anchor="middle" font-size="10" fill="#a5d6a7">Express Router</text>
  <text x="452" y="311" text-anchor="middle" font-size="10" fill="#e6edf3">Mapear URL+verbo a handler</text>
  <text x="662" y="311" text-anchor="middle" font-size="10" fill="#f85149">Lógica, acceso a datos</text>

  <!-- Controllers row -->
  <text x="107" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#58a6ff">Controllers</text>
  <text x="262" y="335" text-anchor="middle" font-size="10" fill="#a8c8f8">req, res, next</text>
  <text x="452" y="335" text-anchor="middle" font-size="10" fill="#e6edf3">Leer req → llamar service → res.json</text>
  <text x="662" y="335" text-anchor="middle" font-size="10" fill="#f85149">Lógica de negocio, BD</text>

  <!-- Services row -->
  <text x="107" y="359" text-anchor="middle" font-size="11" font-weight="600" fill="#bc8cff">Services</text>
  <text x="262" y="359" text-anchor="middle" font-size="10" fill="#d2b4ff">DTOs, tipos de dominio</text>
  <text x="452" y="359" text-anchor="middle" font-size="10" fill="#e6edf3">Reglas de negocio y transformaciones</text>
  <text x="662" y="359" text-anchor="middle" font-size="10" fill="#f85149">req, res, next, BD directa</text>

  <!-- Repositories row -->
  <text x="107" y="383" text-anchor="middle" font-size="11" font-weight="600" fill="#f0883e">Repositories</text>
  <text x="262" y="383" text-anchor="middle" font-size="10" fill="#ffc5a0">Prisma / Array / MongoDB</text>
  <text x="452" y="383" text-anchor="middle" font-size="10" fill="#e6edf3">CRUD en la fuente de datos</text>
  <text x="662" y="383" text-anchor="middle" font-size="10" fill="#f85149">Express, lógica de negocio</text>

  <!-- Rule highlight -->
  <rect x="42" y="398" width="716" height="38" rx="6" fill="#0d4a2a" stroke="#68A063" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-size="11" font-weight="600" fill="#68A063">Regla de flujo: la petición siempre viaja</text>
  <text x="400" y="429" text-anchor="middle" font-size="11" fill="#a5d6a7">Cliente → Routes → Controllers → Services → Repositories → Store/DB → y de vuelta en sentido inverso</text>

  <!-- Defs -->
  <defs>
    <marker id="aw3-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#68A063"/>
    </marker>
    <marker id="aw3-b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="aw3-pu" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#bc8cff"/>
    </marker>
    <marker id="aw3-o" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
    </marker>
    <marker id="aw3-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
