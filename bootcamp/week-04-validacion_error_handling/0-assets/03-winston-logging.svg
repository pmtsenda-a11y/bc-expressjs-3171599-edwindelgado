<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <rect width="820" height="420" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="410" y="36" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e6edf3" text-anchor="middle">Pipeline de Logging — Winston + Morgan</text>

  <!-- ===== LEVELS TABLE (left) ===== -->
  <text x="30" y="66" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">NIVELES DE LOG (high → low)</text>

  <!-- Level rows -->
  <rect x="30" y="76" width="230" height="34" rx="4" fill="#1f1520" stroke="#f85149" stroke-width="1"/>
  <text x="50" y="97" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#f85149">error</text>
  <text x="120" y="97" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">crashes, errores críticos</text>

  <rect x="30" y="114" width="230" height="34" rx="4" fill="#1d1f14" stroke="#e3b341" stroke-width="1"/>
  <text x="50" y="135" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#e3b341">warn</text>
  <text x="120" y="135" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">situaciones anómalas</text>

  <rect x="30" y="152" width="230" height="34" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="50" y="173" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#3fb950">info</text>
  <text x="120" y="173" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">eventos del flujo normal</text>

  <rect x="30" y="190" width="230" height="34" rx="4" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="50" y="211" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#79c0ff">http</text>
  <text x="120" y="211" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">peticiones HTTP (Morgan)</text>

  <rect x="30" y="228" width="230" height="34" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="249" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#8b949e">debug</text>
  <text x="120" y="249" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">detalles de desarrollo</text>

  <!-- Env labels -->
  <text x="30" y="285" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">Nivel activo por entorno:</text>
  <rect x="30" y="294" width="105" height="28" rx="4" fill="#1a2332" stroke="#79c0ff" stroke-width="1"/>
  <text x="82" y="312" font-family="Inter, sans-serif" font-size="10" fill="#79c0ff" text-anchor="middle">development: http</text>
  <rect x="148" y="294" width="112" height="28" rx="4" fill="#1f1520" stroke="#f85149" stroke-width="1"/>
  <text x="204" y="312" font-family="Inter, sans-serif" font-size="10" fill="#f85149" text-anchor="middle">production: warn</text>

  <!-- ===== TRANSPORTS (center) ===== -->
  <text x="310" y="66" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">TRANSPORTS</text>

  <rect x="310" y="76" width="190" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="405" y="96" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#e6edf3" text-anchor="middle">Console</text>
  <text x="405" y="112" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Ambos entornos</text>
  <text x="405" y="125" font-family="Inter, sans-serif" font-size="9" fill="#3fb950" text-anchor="middle">colorize + printf en dev</text>

  <rect x="310" y="144" width="190" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="405" y="164" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#e6edf3" text-anchor="middle">File (logs/error.log)</text>
  <text x="405" y="180" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Solo producción</text>
  <text x="405" y="193" font-family="Inter, sans-serif" font-size="9" fill="#3fb950" text-anchor="middle">level: 'error', formato JSON</text>

  <!-- Morgan box -->
  <rect x="310" y="212" width="190" height="55" rx="6" fill="#1a1f2b" stroke="#f0883e" stroke-width="1.5"/>
  <text x="405" y="232" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#f0883e" text-anchor="middle">Morgan middleware</text>
  <text x="405" y="248" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">log de cada request</text>
  <text x="405" y="261" font-family="Inter, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">→ stream hacia logger.http</text>

  <!-- ===== EXAMPLE OUTPUT (right) ===== -->
  <text x="550" y="66" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">EJEMPLO DE OUTPUT (development)</text>

  <rect x="550" y="76" width="245" height="195" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <!-- Morgan line -->
  <text x="562" y="97" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">2026-04-11 10:32:01 [http]:</text>
  <text x="562" y="111" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">POST /api/v1/products 201 45ms</text>
  <!-- Info line -->
  <text x="562" y="130" font-family="'Courier New', monospace" font-size="9" fill="#3fb950">2026-04-11 10:32:05 [info]:</text>
  <text x="562" y="144" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Server running on :3000</text>
  <!-- Warn line -->
  <text x="562" y="163" font-family="'Courier New', monospace" font-size="9" fill="#e3b341">2026-04-11 10:32:09 [warn]:</text>
  <text x="562" y="177" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Rate limit exceeded: ::1</text>
  <!-- Error line -->
  <text x="562" y="196" font-family="'Courier New', monospace" font-size="9" fill="#f85149">2026-04-11 10:32:12 [error]:</text>
  <text x="562" y="210" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">DB connection lost: ECONNRESET</text>
  <!-- JSON prod example -->
  <text x="562" y="230" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">--- producción (JSON) ---</text>
  <text x="562" y="248" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">{"level":"error","message":"...",</text>
  <text x="562" y="262" font-family="'Courier New', monospace" font-size="9" fill="#8b949e"> "timestamp":"2026-04-11..."}</text>

  <!-- ===== WIRING DIAGRAM (bottom) ===== -->
  <text x="30" y="345" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">INTEGRACIÓN EN app.ts Y config/logger.ts</text>
  <rect x="30" y="355" width="760" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="46" y="373" font-family="'Courier New', monospace" font-size="10" fill="#8b949e">// config/logger.ts</text>
  <text x="220" y="373" font-family="'Courier New', monospace" font-size="10" fill="#8b949e">// app.ts</text>
  <text x="46" y="392" font-family="'Courier New', monospace" font-size="10" fill="#e6edf3">export const logger = <tspan fill="#3fb950">winston.createLogger</tspan>({...})</text>
  <text x="220" y="392" font-family="'Courier New', monospace" font-size="10" fill="#e6edf3">  app.use(<tspan fill="#f0883e">morganMiddleware</tspan>)</text>
  <text x="500" y="392" font-family="'Courier New', monospace" font-size="10" fill="#e6edf3">  <tspan fill="#8b949e">// Morgan → logger.http()</tspan></text>
</svg>
