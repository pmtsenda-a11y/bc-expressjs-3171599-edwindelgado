<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" width="820" height="460">
  <rect width="820" height="460" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="410" y="36" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e6edf3" text-anchor="middle">Flujo de Manejo de Errores en Express</text>

  <!-- Subtitle columns -->
  <text x="200" y="62" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">TIPOS DE ERROR</text>
  <text x="570" y="62" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">PIPELINE EN app.ts</text>

  <!-- Divider between sections -->
  <line x1="400" y1="56" x2="400" y2="430" stroke="#21262d" stroke-width="1.5"/>

  <!-- ===== LEFT: Error types ===== -->

  <!-- AppError box -->
  <rect x="30" y="80" width="170" height="90" rx="6" fill="#1a2332" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="115" y="100" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#79c0ff" text-anchor="middle">AppError</text>
  <text x="115" y="116" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">extends Error</text>
  <text x="115" y="131" font-family="Inter, sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">statusCode: number</text>
  <text x="115" y="146" font-family="Inter, sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">isOperational: true</text>
  <text x="115" y="161" font-family="Inter, sans-serif" font-size="9" fill="#3fb950" text-anchor="middle">404, 400, 409, 403...</text>

  <!-- ZodError box -->
  <rect x="220" y="80" width="160" height="90" rx="6" fill="#231f1a" stroke="#f0883e" stroke-width="1.5"/>
  <text x="300" y="100" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#f0883e" text-anchor="middle">ZodError</text>
  <text x="300" y="116" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">error de validación</text>
  <text x="300" y="131" font-family="Inter, sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">issues: ZodIssue[]</text>
  <text x="300" y="146" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">path + message</text>
  <text x="300" y="161" font-family="Inter, sans-serif" font-size="9" fill="#f0883e" text-anchor="middle">siempre → 400</text>

  <!-- Generic Error box -->
  <rect x="30" y="185" width="350" height="70" rx="6" fill="#1f1520" stroke="#f85149" stroke-width="1.5"/>
  <text x="205" y="205" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#f85149" text-anchor="middle">Error genérico (bug del programador)</text>
  <text x="205" y="221" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">TypeError • ReferenceError • RangeError</text>
  <text x="205" y="237" font-family="Inter, sans-serif" font-size="9" fill="#f85149" text-anchor="middle">isOperational: false — siempre → 500 (sin detalles en prod)</text>

  <!-- Tag: instanceof checks -->
  <text x="30" y="278" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">Detección con instanceof:</text>
  <rect x="30" y="288" width="350" height="60" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="46" y="304" font-family="'Courier New', monospace" font-size="10" fill="#f0883e">if (err instanceof ZodError)  → 400 + issues</text>
  <text x="46" y="320" font-family="'Courier New', monospace" font-size="10" fill="#79c0ff">if (err instanceof AppError)  → err.statusCode</text>
  <text x="46" y="336" font-family="'Courier New', monospace" font-size="10" fill="#f85149">else                          → 500 (log + ocultar detalle)</text>

  <!-- ===== RIGHT: Pipeline ===== -->
  <text x="570" y="80" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">src/app.ts — orden obligatorio</text>

  <!-- Steps in app.ts -->
  <!-- Step 1 -->
  <rect x="430" y="95" width="320" height="42" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="450" y="112" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">1.</text>
  <text x="465" y="112" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#e6edf3">app.use(express.json())</text>
  <text x="465" y="128" font-family="Inter, sans-serif" font-size="9" fill="#8b949e">middlewares de aplicación (morgan, cors, helmet...)</text>

  <!-- Step 2 -->
  <rect x="430" y="150" width="320" height="42" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="450" y="167" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">2.</text>
  <text x="465" y="167" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#79c0ff">app.use('/api/v1/...', router)</text>
  <text x="465" y="183" font-family="Inter, sans-serif" font-size="9" fill="#8b949e">rutas de negocio — controllers pasan errores con next(err)</text>

  <!-- Step 3 -->
  <rect x="430" y="205" width="320" height="42" rx="6" fill="#1a1f2b" stroke="#f0883e" stroke-width="1.5"/>
  <text x="450" y="222" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">3.</text>
  <text x="465" y="222" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#f0883e">app.use(notFound)</text>
  <text x="465" y="238" font-family="Inter, sans-serif" font-size="9" fill="#8b949e">captura rutas no existentes → lanza AppError(404)</text>

  <!-- Step 4 -->
  <rect x="430" y="260" width="320" height="55" rx="6" fill="#1a2332" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="450" y="278" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">4.</text>
  <text x="465" y="278" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#79c0ff">app.use(errorHandler)</text>
  <text x="465" y="294" font-family="Inter, sans-serif" font-size="9" fill="#8b949e">4 parámetros: (err, req, res, next)</text>
  <text x="465" y="307" font-family="Inter, sans-serif" font-size="9" fill="#f85149">⚠ SIEMPRE el último middleware</text>

  <!-- Arrows between steps (right side) -->
  <line x1="590" y1="137" x2="590" y2="148" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrowGrey)"/>
  <line x1="590" y1="192" x2="590" y2="203" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrowGrey)"/>
  <line x1="590" y1="247" x2="590" y2="258" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrowGrey)"/>

  <!-- Response examples -->
  <rect x="430" y="332" width="320" height="88" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="446" y="350" font-family="'Courier New', monospace" font-size="10" fill="#8b949e">// AppError(404)</text>
  <text x="446" y="366" font-family="'Courier New', monospace" font-size="10" fill="#f85149">404</text><text x="476" y="366" font-family="'Courier New', monospace" font-size="10" fill="#e6edf3"> { "error": "Application Error", "message": "..." }</text>
  <text x="446" y="383" font-family="'Courier New', monospace" font-size="10" fill="#8b949e">// ZodError</text>
  <text x="446" y="399" font-family="'Courier New', monospace" font-size="10" fill="#f0883e">400</text><text x="476" y="399" font-family="'Courier New', monospace" font-size="10" fill="#e6edf3"> { "error": "Validation Error", "issues": [...] }</text>
  <text x="446" y="416" font-family="'Courier New', monospace" font-size="10" fill="#8b949e">// Error genérico</text>
  <text x="446" y="416" font-family="'Courier New', monospace" font-size="10" fill="#8b949e"/>

  <defs>
    <marker id="arrowGrey" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#30363d"/>
    </marker>
  </defs>
</svg>
