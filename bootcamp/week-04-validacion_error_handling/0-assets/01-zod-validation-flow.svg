<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440">
  <rect width="820" height="440" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="410" y="36" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e6edf3" text-anchor="middle">Flujo de Validación con Zod</text>

  <!-- ===== SUCCESS PATH ===== -->
  <!-- Labels -->
  <text x="30" y="72" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">FLUJO EXITOSO</text>
  <text x="30" y="86" font-family="Inter, sans-serif" font-size="9" fill="#3fb950">▬▬▬▬</text>

  <!-- Boxes: Request → Controller → Zod .safeParse → Service → Response -->
  <!-- Request -->
  <rect x="30" y="100" width="110" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="85" y="122" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#79c0ff" text-anchor="middle">Request</text>
  <text x="85" y="138" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">POST /products</text>
  <text x="85" y="151" font-family="Inter, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">body: { ... }</text>

  <!-- Arrow -->
  <line x1="140" y1="126" x2="168" y2="126" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Controller -->
  <rect x="170" y="100" width="120" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="230" y="122" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#79c0ff" text-anchor="middle">Controller</text>
  <text x="230" y="138" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">extrae req.body</text>
  <text x="230" y="151" font-family="Inter, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">llama safeParse()</text>

  <!-- Arrow -->
  <line x1="290" y1="126" x2="318" y2="126" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Zod safeParse -->
  <rect x="320" y="100" width="140" height="52" rx="6" fill="#1a2332" stroke="#3fb950" stroke-width="1.5"/>
  <text x="390" y="118" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#3fb950" text-anchor="middle">Zod .safeParse()</text>
  <text x="390" y="133" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">schema.safeParse(body)</text>
  <text x="390" y="148" font-family="Inter, sans-serif" font-size="9" fill="#3fb950" text-anchor="middle">✓ success: true → data</text>

  <!-- Arrow (success) -->
  <line x1="460" y1="126" x2="488" y2="126" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Service -->
  <rect x="490" y="100" width="110" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="545" y="122" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#79c0ff" text-anchor="middle">Service</text>
  <text x="545" y="138" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">lógica negocio</text>
  <text x="545" y="151" font-family="Inter, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">crea el recurso</text>

  <!-- Arrow -->
  <line x1="600" y1="126" x2="628" y2="126" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Response 201 -->
  <rect x="630" y="100" width="120" height="52" rx="6" fill="#162420" stroke="#3fb950" stroke-width="1.5"/>
  <text x="690" y="118" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#3fb950" text-anchor="middle">201 Created</text>
  <text x="690" y="133" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">{ "data": { ... } }</text>
  <text x="690" y="148" font-family="Inter, sans-serif" font-size="9" fill="#3fb950" text-anchor="middle">cliente recibe recurso</text>

  <!-- ===== VALIDATION ERROR PATH ===== -->
  <text x="30" y="205" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">FLUJO CON ERROR DE VALIDACIÓN</text>
  <text x="30" y="219" font-family="Inter, sans-serif" font-size="9" fill="#f85149">▬▬▬▬</text>

  <!-- Zod fail -->
  <rect x="320" y="230" width="140" height="52" rx="6" fill="#1f1520" stroke="#f85149" stroke-width="1.5"/>
  <text x="390" y="248" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#f85149" text-anchor="middle">Zod .safeParse()</text>
  <text x="390" y="263" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">schema.safeParse(body)</text>
  <text x="390" y="278" font-family="Inter, sans-serif" font-size="9" fill="#f85149" text-anchor="middle">✗ success: false → error</text>

  <!-- Arrow down from safeParse fail -->
  <line x1="390" y1="130" x2="390" y2="228" stroke="#f85149" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="395" y="185" font-family="Inter, sans-serif" font-size="9" fill="#f85149">validation</text>
  <text x="395" y="196" font-family="Inter, sans-serif" font-size="9" fill="#f85149">fails</text>

  <!-- Arrow from fail to 400 -->
  <line x1="460" y1="256" x2="628" y2="256" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Response 400 -->
  <rect x="630" y="230" width="140" height="70" rx="6" fill="#1f1520" stroke="#f85149" stroke-width="1.5"/>
  <text x="700" y="248" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#f85149" text-anchor="middle">400 Bad Request</text>
  <text x="700" y="264" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">{ "error": "Validation",</text>
  <text x="700" y="278" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">"issues": [</text>
  <text x="700" y="291" font-family="Inter, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">{ field, message } ] }</text>

  <!-- ===== CODE PANEL ===== -->
  <rect x="30" y="335" width="760" height="88" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="356" font-family="'Courier New', monospace" font-size="11" fill="#8b949e">// Controller — patrón safeParse</text>
  <text x="50" y="373" font-family="'Courier New', monospace" font-size="11" fill="#e6edf3">const result = <tspan fill="#3fb950">createProductSchema</tspan>.safeParse(req.body);</text>
  <text x="50" y="390" font-family="'Courier New', monospace" font-size="11" fill="#e6edf3">if (!result.success) { <tspan fill="#8b949e">/* mapear result.error.issues → res.status(400) */</tspan> <tspan fill="#f85149">return</tspan>; }</text>
  <text x="50" y="407" font-family="'Courier New', monospace" font-size="11" fill="#e6edf3">const dto = result.data; <tspan fill="#8b949e">// tipado como CreateProductDto ✓</tspan></text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f85149"/>
    </marker>
  </defs>
</svg>
