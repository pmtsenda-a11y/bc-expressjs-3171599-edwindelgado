<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="760" height="340" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="700">Flujo de Trabajo con TypeScript</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#484f58"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#68A063"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#79c0ff"/>
    </marker>
  </defs>

  <!-- ══════════════════════════ STEP 1: .ts file ══════════════════════════ -->
  <rect x="20" y="70" width="140" height="80" rx="8" fill="#161b22" stroke="#68A063" stroke-width="2"/>
  <text x="90" y="96" text-anchor="middle" fill="#68A063" font-size="11" font-weight="700">Archivo fuente</text>
  <text x="90" y="114" text-anchor="middle" fill="#79c0ff" font-size="22" font-weight="700">src/</text>
  <text x="90" y="136" text-anchor="middle" fill="#8b949e" font-size="10">*.ts</text>

  <!-- Arrow 1→2 -->
  <line x1="162" y1="110" x2="195" y2="110" stroke="#68A063" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- ══════════════════════════ STEP 2: tsx watch (dev) ══════════════════════════ -->
  <rect x="198" y="55" width="160" height="110" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="198" y="55" width="160" height="26" rx="8" fill="#1a2e1a"/>
  <rect x="198" y="69" width="160" height="12" fill="#1a2e1a"/>
  <text x="278" y="71" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="700">① DESARROLLO</text>
  <rect x="206" y="84" width="144" height="22" rx="4" fill="#0d1117"/>
  <text x="278" y="99" text-anchor="middle" fill="#68A063" font-size="10" font-weight="600">pnpm dev</text>
  <text x="278" y="116" text-anchor="middle" fill="#8b949e" font-size="9">tsx watch src/index.ts</text>
  <text x="278" y="129" text-anchor="middle" fill="#8b949e" font-size="9">Recarga en cada cambio</text>
  <text x="278" y="142" text-anchor="middle" fill="#484f58" font-size="9">Sin compilar a disco</text>
  <text x="278" y="158" text-anchor="middle" fill="#3fb950" font-size="9">← usa esto siempre en dev</text>

  <!-- Arrow 2→3 -->
  <line x1="360" y1="110" x2="393" y2="110" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════ STEP 3: tsc --noEmit (check) ══════════════════════════ -->
  <rect x="396" y="55" width="160" height="110" rx="8" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <rect x="396" y="55" width="160" height="26" rx="8" fill="#2e2408"/>
  <rect x="396" y="69" width="160" height="12" fill="#2e2408"/>
  <text x="476" y="71" text-anchor="middle" fill="#e3b341" font-size="10" font-weight="700">② VERIFICAR TIPOS</text>
  <rect x="404" y="84" width="144" height="22" rx="4" fill="#0d1117"/>
  <text x="476" y="99" text-anchor="middle" fill="#e3b341" font-size="10" font-weight="600">pnpm build</text>
  <text x="476" y="116" text-anchor="middle" fill="#8b949e" font-size="9">tsc --noEmit</text>
  <text x="476" y="129" text-anchor="middle" fill="#8b949e" font-size="9">Revisa errores de tipos</text>
  <text x="476" y="142" text-anchor="middle" fill="#484f58" font-size="9">No genera archivos JS</text>
  <text x="476" y="158" text-anchor="middle" fill="#e3b341" font-size="9">← antes de cada commit</text>

  <!-- Arrow 3→4 -->
  <line x1="558" y1="110" x2="591" y2="110" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════ STEP 4: tsc (build) ══════════════════════════ -->
  <rect x="594" y="55" width="140" height="110" rx="8" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <rect x="594" y="55" width="140" height="26" rx="8" fill="#0c1e35"/>
  <rect x="594" y="69" width="140" height="12" fill="#0c1e35"/>
  <text x="664" y="71" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="700">③ BUILD PRODUCCIÓN</text>
  <rect x="602" y="84" width="124" height="22" rx="4" fill="#0d1117"/>
  <text x="664" y="99" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">tsc</text>
  <text x="664" y="116" text-anchor="middle" fill="#8b949e" font-size="9">Compila .ts → .js</text>
  <text x="664" y="129" text-anchor="middle" fill="#8b949e" font-size="9">Genera dist/</text>
  <text x="664" y="142" text-anchor="middle" fill="#484f58" font-size="9">node dist/index.js</text>
  <text x="664" y="158" text-anchor="middle" fill="#79c0ff" font-size="9">← para despliegue</text>

  <!-- ══════════════════════════ OUTPUT: dist/ ══════════════════════════ -->
  <rect x="594" y="200" width="140" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="664" y="224" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="700">dist/</text>
  <text x="664" y="244" text-anchor="middle" fill="#484f58" font-size="10">*.js compilado</text>

  <!-- Arrow 4→dist -->
  <line x1="664" y1="167" x2="664" y2="198" stroke="#79c0ff" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <!-- ══════════════════════════ tsconfig.json key options ══════════════════════════ -->
  <rect x="20" y="185" width="560" height="130" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="34" y="207" fill="#e6edf3" font-size="11" font-weight="700">Opciones clave en tsconfig.json</text>
  <line x1="30" y1="213" x2="570" y2="213" stroke="#30363d" stroke-width="1"/>

  <!-- Options grid: 2 columns -->
  <text x="38" y="232" fill="#e3b341" font-size="10" font-weight="600">"strict": true</text>
  <text x="180" y="232" fill="#8b949e" font-size="10">Activa todas las verificaciones estrictas de tipos</text>

  <text x="38" y="250" fill="#e3b341" font-size="10" font-weight="600">"module": "NodeNext"</text>
  <text x="180" y="250" fill="#8b949e" font-size="10">Genera import/export ESM compatible con Node.js</text>

  <text x="38" y="268" fill="#e3b341" font-size="10" font-weight="600">"target": "ES2022"</text>
  <text x="180" y="268" fill="#8b949e" font-size="10">Transpila para Node.js 16+ (async/await nativo)</text>

  <text x="38" y="286" fill="#e3b341" font-size="10" font-weight="600">"outDir": "dist"</text>
  <text x="180" y="286" fill="#8b949e" font-size="10">Carpeta de salida para los archivos compilados</text>

  <text x="38" y="304" fill="#e3b341" font-size="10" font-weight="600">"noUnusedLocals": true</text>
  <text x="180" y="304" fill="#8b949e" font-size="10">Error si hay variables declaradas pero no usadas</text>
</svg>
