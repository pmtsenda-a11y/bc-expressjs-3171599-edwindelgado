<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="760" height="420" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="380" y="38" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="700">Node.js Event Loop</text>
  <text x="380" y="58" text-anchor="middle" fill="#8b949e" font-size="12">Flujo de ejecución en cada iteración</text>

  <!-- ── CALL STACK (left) ── -->
  <rect x="28" y="80" width="140" height="240" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="98" y="102" text-anchor="middle" fill="#68A063" font-size="12" font-weight="700">Call Stack</text>
  <line x1="38" y1="110" x2="158" y2="110" stroke="#30363d" stroke-width="1"/>
  <rect x="44" y="118" width="108" height="28" rx="4" fill="#1c2128"/>
  <text x="98" y="137" text-anchor="middle" fill="#79c0ff" font-size="11">main()</text>
  <rect x="44" y="152" width="108" height="28" rx="4" fill="#1c2128"/>
  <text x="98" y="171" text-anchor="middle" fill="#79c0ff" font-size="11">readFile()</text>
  <rect x="44" y="186" width="108" height="28" rx="4" fill="#1c2128" stroke="#68A063" stroke-width="1"/>
  <text x="98" y="205" text-anchor="middle" fill="#68A063" font-size="11">fs callback</text>
  <text x="98" y="240" text-anchor="middle" fill="#484f58" font-size="10">LIFO — Last In, First Out</text>

  <!-- ── V8 ENGINE badge ── -->
  <rect x="38" y="290" width="112" height="22" rx="4" fill="#21262d"/>
  <text x="94" y="305" text-anchor="middle" fill="#8b949e" font-size="10">V8 Engine ejecuta JS</text>

  <!-- ── Arrow stack → event loop ── -->
  <line x1="168" y1="200" x2="210" y2="200" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── EVENT LOOP (center) ── -->
  <circle cx="310" cy="200" r="78" fill="none" stroke="#68A063" stroke-width="2"/>
  <circle cx="310" cy="200" r="60" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="310" y="193" text-anchor="middle" fill="#68A063" font-size="13" font-weight="700">Event</text>
  <text x="310" y="211" text-anchor="middle" fill="#68A063" font-size="13" font-weight="700">Loop</text>

  <!-- Phase labels around circle -->
  <!-- timers (top) -->
  <text x="310" y="110" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">timers</text>
  <text x="310" y="122" text-anchor="middle" fill="#8b949e" font-size="9">setTimeout / setInterval</text>
  <!-- poll (right) -->
  <text x="402" y="197" text-anchor="start" fill="#e6edf3" font-size="10" font-weight="600">poll</text>
  <text x="402" y="210" text-anchor="start" fill="#8b949e" font-size="9">I/O callbacks</text>
  <!-- check (bottom) -->
  <text x="310" y="292" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">check</text>
  <text x="310" y="304" text-anchor="middle" fill="#8b949e" font-size="9">setImmediate</text>
  <!-- pending (left) -->
  <text x="216" y="197" text-anchor="end" fill="#e6edf3" font-size="10" font-weight="600">pending</text>
  <text x="216" y="210" text-anchor="end" fill="#8b949e" font-size="9">I/O errors</text>

  <!-- Rotation arrow (clockwise arc) -->
  <path d="M310 128 A72 72 0 0 1 382 200" fill="none" stroke="#68A063" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrGreen)"/>

  <!-- ── Arrow loop → queues ── -->
  <line x1="390" y1="200" x2="430" y2="200" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── QUEUES (right) ── -->
  <rect x="430" y="80" width="300" height="260" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="580" y="102" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700">Colas de Tareas</text>
  <line x1="440" y1="110" x2="720" y2="110" stroke="#30363d" stroke-width="1"/>

  <!-- Microtask Queue -->
  <rect x="444" y="118" width="272" height="62" rx="6" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
  <text x="460" y="136" fill="#3fb950" font-size="11" font-weight="700">① Microtask Queue</text>
  <text x="460" y="152" fill="#8b949e" font-size="10">process.nextTick()</text>
  <text x="460" y="165" fill="#8b949e" font-size="10">Promise.resolve() — .then()</text>
  <text x="700" y="155" fill="#3fb950" font-size="9" text-anchor="end">PRIORIDAD ALTA</text>

  <!-- Macrotask Queue -->
  <rect x="444" y="192" width="272" height="62" rx="6" fill="#1c2128" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="460" y="210" fill="#79c0ff" font-size="11" font-weight="700">② Macrotask Queue</text>
  <text x="460" y="226" fill="#8b949e" font-size="10">setTimeout() / setInterval()</text>
  <text x="460" y="239" fill="#8b949e" font-size="10">setImmediate() — I/O callbacks</text>
  <text x="700" y="229" fill="#79c0ff" font-size="9" text-anchor="end">PRIORIDAD BAJA</text>

  <!-- Execution order note -->
  <rect x="444" y="266" width="272" height="60" rx="6" fill="#21262d"/>
  <text x="580" y="284" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">Orden de ejecución</text>
  <text x="460" y="300" fill="#8b949e" font-size="10">1. Stack síncrono vacío</text>
  <text x="460" y="314" fill="#8b949e" font-size="10">2. Microtasks → 3. Macrotasks</text>

  <!-- ── libuv label (bottom center) ── -->
  <rect x="220" y="360" width="180" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="310" y="375" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="600">libuv</text>
  <text x="310" y="389" text-anchor="middle" fill="#484f58" font-size="9">Thread pool para I/O del sistema</text>
  <line x1="310" y1="278" x2="310" y2="358" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ── Arrows markers ── -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#484f58"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#68A063"/>
    </marker>
  </defs>
</svg>
