<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="760" height="380" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="700">Evolución de Patrones Asíncronos</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- COLUMN 1: CALLBACKS -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="20" y="58" width="220" height="280" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="20" y="58" width="220" height="36" rx="8" fill="#21262d"/>
  <rect x="20" y="82" width="220" height="12" fill="#21262d"/>
  <text x="130" y="81" text-anchor="middle" fill="#f85149" font-size="13" font-weight="700">① Callbacks</text>
  <rect x="26" y="100" width="60" height="16" rx="3" fill="#3d1a19"/>
  <text x="56" y="112" text-anchor="middle" fill="#f85149" font-size="9">ES5 — 2009</text>

  <!-- Code block -->
  <rect x="28" y="122" width="204" height="160" rx="5" fill="#0d1117"/>
  <text x="38" y="140" fill="#8b949e" font-size="10">readFile(path, 'utf-8',</text>
  <text x="38" y="155" fill="#8b949e" font-size="10">  (err, data) =&gt; {</text>
  <text x="38" y="170" fill="#f85149" font-size="10">    if (err) throw err;</text>
  <text x="38" y="185" fill="#8b949e" font-size="10">    process(data,</text>
  <text x="38" y="200" fill="#8b949e" font-size="10">      (err2, result) =&gt; {</text>
  <text x="38" y="215" fill="#f85149" font-size="10">        if (err2) throw err2;</text>
  <text x="38" y="230" fill="#8b949e" font-size="10">        save(result, (e) =&gt; {</text>
  <text x="38" y="245" fill="#f85149" font-size="10">          if (e) throw e;</text>
  <text x="38" y="260" fill="#8b949e" font-size="10">        });</text>
  <text x="38" y="275" fill="#8b949e" font-size="10">      });</text>

  <!-- Issues -->
  <rect x="28" y="290" width="204" height="40" rx="5" fill="#21262d"/>
  <text x="130" y="306" text-anchor="middle" fill="#f85149" font-size="10" font-weight="600">⚠ Callback Hell</text>
  <text x="130" y="320" text-anchor="middle" fill="#8b949e" font-size="9">Difícil manejo de errores</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- COLUMN 2: PROMISES -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="270" y="58" width="220" height="280" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="270" y="58" width="220" height="36" rx="8" fill="#21262d"/>
  <rect x="270" y="82" width="220" height="12" fill="#21262d"/>
  <text x="380" y="81" text-anchor="middle" fill="#e3b341" font-size="13" font-weight="700">② Promises</text>
  <rect x="276" y="100" width="60" height="16" rx="3" fill="#3d2e0a"/>
  <text x="306" y="112" text-anchor="middle" fill="#e3b341" font-size="9">ES6 — 2015</text>

  <!-- Code block -->
  <rect x="278" y="122" width="204" height="160" rx="5" fill="#0d1117"/>
  <text x="288" y="140" fill="#8b949e" font-size="10">readFile(path, 'utf-8')</text>
  <text x="288" y="155" fill="#e3b341" font-size="10">  .then((data) =&gt;</text>
  <text x="288" y="170" fill="#8b949e" font-size="10">    process(data)</text>
  <text x="288" y="185" fill="#e3b341" font-size="10">  )</text>
  <text x="288" y="200" fill="#e3b341" font-size="10">  .then((result) =&gt;</text>
  <text x="288" y="215" fill="#8b949e" font-size="10">    save(result)</text>
  <text x="288" y="230" fill="#e3b341" font-size="10">  )</text>
  <text x="288" y="245" fill="#79c0ff" font-size="10">  .catch((err) =&gt;</text>
  <text x="288" y="260" fill="#8b949e" font-size="10">    console.error(err)</text>
  <text x="288" y="275" fill="#79c0ff" font-size="10">  );</text>

  <!-- Notes -->
  <rect x="278" y="290" width="204" height="40" rx="5" fill="#21262d"/>
  <text x="380" y="306" text-anchor="middle" fill="#e3b341" font-size="10" font-weight="600">✓ Encadenamiento limpio</text>
  <text x="380" y="320" text-anchor="middle" fill="#8b949e" font-size="9">Un solo .catch() para todo</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- COLUMN 3: ASYNC/AWAIT -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="520" y="58" width="220" height="280" rx="8" fill="#161b22" stroke="#68A063" stroke-width="2"/>

  <!-- Header -->
  <rect x="520" y="58" width="220" height="36" rx="8" fill="#1a2e1a"/>
  <rect x="520" y="82" width="220" height="12" fill="#1a2e1a"/>
  <text x="630" y="81" text-anchor="middle" fill="#68A063" font-size="13" font-weight="700">③ async / await</text>
  <rect x="526" y="100" width="68" height="16" rx="3" fill="#1a2e1a"/>
  <text x="560" y="112" text-anchor="middle" fill="#68A063" font-size="9">ES2017 — Estándar</text>

  <!-- Code block -->
  <rect x="528" y="122" width="204" height="160" rx="5" fill="#0d1117"/>
  <text x="538" y="140" fill="#68A063" font-size="10">async function run() {</text>
  <text x="538" y="155" fill="#79c0ff" font-size="10">  try {</text>
  <text x="538" y="170" fill="#8b949e" font-size="10">    const data =</text>
  <text x="538" y="185" fill="#68A063" font-size="10">      await readFile(path);</text>
  <text x="538" y="200" fill="#8b949e" font-size="10">    const result =</text>
  <text x="538" y="215" fill="#68A063" font-size="10">      await process(data);</text>
  <text x="538" y="230" fill="#68A063" font-size="10">    await save(result);</text>
  <text x="538" y="245" fill="#79c0ff" font-size="10">  } catch (err) {</text>
  <text x="538" y="260" fill="#8b949e" font-size="10">    console.error(err);</text>
  <text x="538" y="275" fill="#79c0ff" font-size="10">  }</text>

  <!-- Notes -->
  <rect x="528" y="290" width="204" height="40" rx="5" fill="#1a2e1a"/>
  <text x="630" y="306" text-anchor="middle" fill="#68A063" font-size="10" font-weight="600">✅ Recomendado en este bootcamp</text>
  <text x="630" y="320" text-anchor="middle" fill="#8b949e" font-size="9">Legible · try/catch nativo · testeable</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- ARROWS between columns -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#484f58"/>
    </marker>
  </defs>
  <line x1="242" y1="198" x2="268" y2="198" stroke="#484f58" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="492" y1="198" x2="518" y2="198" stroke="#484f58" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Bottom: Promise.all note -->
  <rect x="200" y="352" width="360" height="22" rx="5" fill="#21262d"/>
  <text x="380" y="367" text-anchor="middle" fill="#8b949e" font-size="10">
    <tspan fill="#79c0ff">Promise.all([</tspan>
    <tspan fill="#e6edf3">task1(), task2()</tspan>
    <tspan fill="#79c0ff">])</tspan>
    <tspan> — ejecutar múltiples en paralelo</tspan>
  </text>
</svg>
