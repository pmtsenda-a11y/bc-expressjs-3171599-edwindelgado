<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="760" height="400" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="700">CommonJS vs ES Modules (ESM)</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- LEFT: CommonJS -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="20" y="58" width="340" height="310" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- Header CJS -->
  <rect x="20" y="58" width="340" height="36" rx="8" fill="#21262d"/>
  <rect x="20" y="82" width="340" height="12" fill="#21262d"/>
  <text x="190" y="82" text-anchor="middle" fill="#e3b341" font-size="13" font-weight="700">CommonJS (CJS)</text>
  <rect x="26" y="100" width="80" height="16" rx="3" fill="#3d2e0a"/>
  <text x="66" y="112" text-anchor="middle" fill="#e3b341" font-size="9">Node.js histórico · Legacy</text>

  <!-- CJS code: export -->
  <text x="34" y="136" fill="#8b949e" font-size="10" font-weight="600">EXPORTAR</text>
  <rect x="28" y="142" width="324" height="52" rx="5" fill="#0d1117"/>
  <text x="38" y="159" fill="#8b949e" font-size="10">// math.js</text>
  <text x="38" y="173" fill="#f85149" font-size="10">module</text>
  <text x="68" y="173" fill="#e6edf3" font-size="10">.exports = { add, PI };</text>
  <text x="38" y="187" fill="#8b949e" font-size="10">// o: exports.add = add;</text>

  <!-- CJS code: import -->
  <text x="34" y="212" fill="#8b949e" font-size="10" font-weight="600">IMPORTAR</text>
  <rect x="28" y="218" width="324" height="52" rx="5" fill="#0d1117"/>
  <text x="38" y="235" fill="#8b949e" font-size="10">// index.js</text>
  <text x="38" y="249" fill="#79c0ff" font-size="10">const</text>
  <text x="62" y="249" fill="#e6edf3" font-size="10">{ add, PI } =</text>
  <text x="38" y="263" fill="#f85149" font-size="10">  require</text>
  <text x="84" y="263" fill="#e6edf3" font-size="10">('./math'); // sin extensión</text>

  <!-- CJS characteristics -->
  <rect x="28" y="278" width="324" height="80" rx="5" fill="#21262d"/>
  <text x="42" y="296" fill="#8b949e" font-size="10">⚡ Carga síncrona — bloquea hasta completar</text>
  <text x="42" y="311" fill="#8b949e" font-size="10">📦 package.json: sin "type" o "type": "commonjs"</text>
  <text x="42" y="326" fill="#8b949e" font-size="10">📁 Extensión de archivo: <tspan fill="#e3b341">.js</tspan> o <tspan fill="#e3b341">.cjs</tspan></text>
  <text x="42" y="341" fill="#8b949e" font-size="10">🔍 No requiere extensión en require()</text>
  <text x="42" y="356" fill="#f85149" font-size="10">⚠ Estándar antiguo — usar ESM para proyectos nuevos</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- RIGHT: ESM -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="400" y="58" width="340" height="310" rx="8" fill="#161b22" stroke="#68A063" stroke-width="2"/>

  <!-- Header ESM -->
  <rect x="400" y="58" width="340" height="36" rx="8" fill="#1a2e1a"/>
  <rect x="400" y="82" width="340" height="12" fill="#1a2e1a"/>
  <text x="570" y="82" text-anchor="middle" fill="#68A063" font-size="13" font-weight="700">ES Modules (ESM)</text>
  <rect x="406" y="100" width="90" height="16" rx="3" fill="#1a2e1a"/>
  <text x="451" y="112" text-anchor="middle" fill="#68A063" font-size="9">Estándar moderno · Node.js 12+</text>

  <!-- ESM code: export -->
  <text x="414" y="136" fill="#8b949e" font-size="10" font-weight="600">EXPORTAR</text>
  <rect x="408" y="142" width="324" height="52" rx="5" fill="#0d1117"/>
  <text x="418" y="159" fill="#8b949e" font-size="10">// math.ts</text>
  <text x="418" y="173" fill="#68A063" font-size="10">export</text>
  <text x="452" y="173" fill="#e6edf3" font-size="10"> function add(a: number, b: number) { ... }</text>
  <text x="418" y="187" fill="#68A063" font-size="10">export</text>
  <text x="452" y="187" fill="#e6edf3" font-size="10"> const PI = 3.14159;</text>

  <!-- ESM code: import -->
  <text x="414" y="212" fill="#8b949e" font-size="10" font-weight="600">IMPORTAR</text>
  <rect x="408" y="218" width="324" height="52" rx="5" fill="#0d1117"/>
  <text x="418" y="235" fill="#8b949e" font-size="10">// index.ts</text>
  <text x="418" y="249" fill="#68A063" font-size="10">import</text>
  <text x="453" y="249" fill="#e6edf3" font-size="10"> { add, PI } </text>
  <text x="418" y="263" fill="#68A063" font-size="10">  from</text>
  <text x="446" y="263" fill="#e6edf3" font-size="10"> './math</text>
  <text x="495" y="263" fill="#f85149" font-size="10">.js</text>
  <text x="510" y="263" fill="#e6edf3" font-size="10">'; // extensión .js obligatoria</text>

  <!-- ESM characteristics -->
  <rect x="408" y="278" width="324" height="80" rx="5" fill="#1a2e1a"/>
  <text x="422" y="296" fill="#8b949e" font-size="10">⚡ Carga estática — analizable en build time</text>
  <text x="422" y="311" fill="#8b949e" font-size="10">📦 package.json: <tspan fill="#68A063">"type": "module"</tspan> (obligatorio)</text>
  <text x="422" y="326" fill="#8b949e" font-size="10">📁 Extensión de archivo: <tspan fill="#68A063">.mjs</tspan> o <tspan fill="#68A063">.ts</tspan> (con tsconfig)</text>
  <text x="422" y="341" fill="#68A063" font-size="10">✅ Con NodeNext: importar con extensión <tspan font-weight="700">.js</tspan></text>
  <text x="422" y="356" fill="#68A063" font-size="10">✅ Estándar en este bootcamp — Node.js 22 + TypeScript</text>

  <!-- Bottom: NodeNext note -->
  <rect x="20" y="379" width="720" height="18" rx="4" fill="#21262d"/>
  <text x="380" y="392" text-anchor="middle" fill="#8b949e" font-size="10">
    <tspan fill="#79c0ff">tsconfig.json</tspan>
    <tspan>: </tspan>
    <tspan fill="#e3b341">"module": "NodeNext"</tspan>
    <tspan> + </tspan>
    <tspan fill="#e3b341">"moduleResolution": "NodeNext"</tspan>
    <tspan> → imports locales siempre con </tspan>
    <tspan fill="#f85149">'.js'</tspan>
  </text>
</svg>
