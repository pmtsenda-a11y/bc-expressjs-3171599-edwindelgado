<svg viewBox="0 0 920 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="920" height="500" fill="#0d1117"/>

  <!-- Title -->
  <text x="460" y="38" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">Estructura de un JSON Web Token (JWT)</text>

  <!-- Token string box -->
  <rect x="40" y="56" width="840" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="460" y="76" text-anchor="middle" fill="#8b949e" font-size="11">Token completo (codificado en Base64URL)</text>
  <!-- Header part -->
  <text x="105" y="95" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="600">eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9</text>
  <!-- Dot 1 -->
  <text x="244" y="95" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="700">.</text>
  <!-- Payload part -->
  <text x="490" y="95" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600">eyJzdWIiOiI2NjdiMjNlZiIsImVtYWlsIjoidXNlckB0ZXN0LmNvbSIsInJvbGUiOiJ1c2VyIiwiaWF0IjoxNzE3MDAwMDAwLCJleHAiOjE3MTcwMDA5MDB9</text>
  <!-- Dot 2 -->
  <text x="787" y="95" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="700">.</text>
  <!-- Signature part -->
  <text x="855" y="95" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="600">SflKxwRJ...</text>

  <!-- Arrows from token to boxes -->
  <line x1="105" y1="106" x2="105" y2="156" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="460" y1="106" x2="460" y2="156" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="820" y1="106" x2="820" y2="156" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Header Box -->
  <rect x="20" y="158" width="230" height="130" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <rect x="20" y="158" width="230" height="30" rx="8" fill="#1c2d44"/>
  <rect x="20" y="178" width="230" height="10" rx="0" fill="#1c2d44"/>
  <text x="135" y="179" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="700">HEADER</text>
  <text x="135" y="196" text-anchor="middle" fill="#8b949e" font-size="10">Algoritmo y tipo de token</text>
  <text x="40" y="218" fill="#8b949e" font-size="11">{</text>
  <text x="52" y="235" fill="#79c0ff" font-size="11">"alg":</text>
  <text x="120" y="235" fill="#a5d6ff" font-size="11">"HS256"</text>
  <text x="52" y="252" fill="#79c0ff" font-size="11">"typ":</text>
  <text x="120" y="252" fill="#a5d6ff" font-size="11">"JWT"</text>
  <text x="40" y="269" fill="#8b949e" font-size="11">}</text>
  <text x="135" y="284" text-anchor="middle" fill="#637488" font-size="9">HMAC-SHA256 (simétrico)</text>

  <!-- Payload Box -->
  <rect x="275" y="158" width="370" height="130" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <rect x="275" y="158" width="370" height="30" rx="8" fill="#1a2e1a"/>
  <rect x="275" y="178" width="370" height="10" rx="0" fill="#1a2e1a"/>
  <text x="460" y="179" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="700">PAYLOAD</text>
  <text x="460" y="196" text-anchor="middle" fill="#8b949e" font-size="10">Claims del usuario (legible, no cifrado)</text>
  <text x="290" y="218" fill="#8b949e" font-size="11">{</text>
  <text x="306" y="234" fill="#79c0ff" font-size="11">"sub":</text>
  <text x="360" y="234" fill="#a5d6ff" font-size="11">"667b23ef"</text>
  <text x="460" y="234" fill="#8b949e" font-size="10">← ID del usuario</text>
  <text x="306" y="250" fill="#79c0ff" font-size="11">"email":</text>
  <text x="370" y="250" fill="#a5d6ff" font-size="11">"user@test.com"</text>
  <text x="306" y="266" fill="#79c0ff" font-size="11">"role":</text>
  <text x="360" y="266" fill="#a5d6ff" font-size="11">"user"</text>
  <text x="306" y="282" fill="#79c0ff" font-size="11">"iat":  1717000000</text>
  <text x="460" y="282" fill="#8b949e" font-size="10">← issued at</text>
  <text x="290" y="282" fill="#8b949e" font-size="11"/>
  <!-- exp field in next row — reusing space -->
  <text x="306" y="280" fill="#79c0ff" font-size="11">"iat":  1717000000,  "exp": 1717000900</text>
  <text x="290" y="280" fill="#8b949e" font-size="11">}</text>

  <!-- Signature Box -->
  <rect x="670" y="158" width="230" height="130" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <rect x="670" y="158" width="230" height="30" rx="8" fill="#2e1e0a"/>
  <rect x="670" y="178" width="230" height="10" rx="0" fill="#2e1e0a"/>
  <text x="785" y="179" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="700">SIGNATURE</text>
  <text x="785" y="196" text-anchor="middle" fill="#8b949e" font-size="10">Garantía de integridad</text>
  <text x="685" y="218" fill="#8b949e" font-size="10">HMAC-SHA256(</text>
  <text x="698" y="234" fill="#58a6ff" font-size="10">base64(header)</text>
  <text x="685" y="250" fill="#8b949e" font-size="10">  + "." +</text>
  <text x="698" y="266" fill="#3fb950" font-size="10">base64(payload)</text>
  <text x="698" y="282" fill="#ffa657" font-size="10">JWT_SECRET</text>
  <text x="685" y="282" fill="#8b949e" font-size="10">)</text>

  <!-- Row: Claims reference table -->
  <rect x="20" y="308" width="880" height="24" rx="4" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="460" y="324" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">Claims Registrados (estándar RFC 7519)</text>

  <!-- Table headers -->
  <rect x="20" y="332" width="880" height="22" rx="0" fill="#1c2030"/>
  <text x="120" y="347" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Claim</text>
  <text x="300" y="347" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Nombre completo</text>
  <text x="580" y="347" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Descripción</text>

  <line x1="20" y1="354" x2="900" y2="354" stroke="#30363d" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="120" y="370" text-anchor="middle" fill="#79c0ff" font-size="11">sub</text>
  <text x="300" y="370" text-anchor="middle" fill="#e6edf3" font-size="11">Subject</text>
  <text x="580" y="370" text-anchor="middle" fill="#8b949e" font-size="11">ID del usuario — siempre string</text>
  <!-- Row 2 -->
  <text x="120" y="388" text-anchor="middle" fill="#79c0ff" font-size="11">iat</text>
  <text x="300" y="388" text-anchor="middle" fill="#e6edf3" font-size="11">Issued At</text>
  <text x="580" y="388" text-anchor="middle" fill="#8b949e" font-size="11">Timestamp Unix de emisión (segundos)</text>
  <!-- Row 3 -->
  <text x="120" y="406" text-anchor="middle" fill="#79c0ff" font-size="11">exp</text>
  <text x="300" y="406" text-anchor="middle" fill="#e6edf3" font-size="11">Expiration Time</text>
  <text x="580" y="406" text-anchor="middle" fill="#8b949e" font-size="11">Timestamp Unix de expiración — verificado automáticamente</text>
  <!-- Row 4 -->
  <text x="120" y="424" text-anchor="middle" fill="#ffa657" font-size="11">email, role</text>
  <text x="300" y="424" text-anchor="middle" fill="#e6edf3" font-size="11">Claims personalizados</text>
  <text x="580" y="424" text-anchor="middle" fill="#8b949e" font-size="11">Cualquier dato del negocio — NUNCA contraseñas</text>

  <!-- Warning box -->
  <rect x="20" y="438" width="880" height="46" rx="6" fill="#2d1b00" stroke="#bb8009" stroke-width="1"/>
  <text x="32" y="456" fill="#d29922" font-size="12" font-weight="700">⚠️ Importante:</text>
  <text x="32" y="474" fill="#e6edf3" font-size="11">El payload es codificado en Base64URL, no cifrado. Es legible por cualquiera. La firma solo garantiza que no fue modificado.</text>
</svg>
