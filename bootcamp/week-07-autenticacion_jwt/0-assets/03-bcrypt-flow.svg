<svg viewBox="0 0 920 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="920" height="480" fill="#0d1117"/>

  <!-- Title -->
  <text x="460" y="34" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">Hash de Contraseñas con bcrypt</text>

  <!-- ── HASHING FLOW ──────────────────────────────────── -->
  <text x="460" y="62" text-anchor="middle" fill="#8b949e" font-size="12">Al registrar: plaintext → hash  |  Al hacer login: comparar</text>

  <!-- Plaintext box -->
  <rect x="30" y="74" width="180" height="64" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <text x="120" y="96" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700">Contraseña</text>
  <text x="120" y="114" text-anchor="middle" fill="#e6edf3" font-size="13">"miPassword123"</text>
  <text x="120" y="130" text-anchor="middle" fill="#8b949e" font-size="10">Texto plano del usuario</text>

  <!-- Arrow + label -->
  <line x1="210" y1="106" x2="290" y2="106" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="250" y="100" text-anchor="middle" fill="#8b949e" font-size="10">bcrypt.hash(</text>
  <text x="250" y="114" text-anchor="middle" fill="#8b949e" font-size="10">pwd, 10)</text>

  <!-- bcrypt operation box -->
  <rect x="290" y="74" width="260" height="64" rx="8" fill="#1c2d44" stroke="#58a6ff" stroke-width="2"/>
  <text x="420" y="92" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">bcrypt Internamente</text>
  <text x="420" y="110" text-anchor="middle" fill="#8b949e" font-size="10">① Genera salt aleatorio único</text>
  <text x="420" y="126" text-anchor="middle" fill="#8b949e" font-size="10">② Aplica algoritmo Blowfish × 2^10 = 1,024 iteraciones</text>

  <!-- Arrow -->
  <line x1="550" y1="106" x2="630" y2="106" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Hash result box -->
  <rect x="630" y="74" width="260" height="64" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="760" y="92" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">Hash Resultante</text>
  <text x="760" y="110" text-anchor="middle" fill="#e6edf3" font-size="10">$2b$10$N9qo8uLOickgx2ZMRZoMyeI</text>
  <text x="760" y="126" text-anchor="middle" fill="#8b949e" font-size="10">60 chars: algoritmo + rounds + salt + digest</text>

  <!-- Anatomy of hash -->
  <rect x="630" y="152" width="260" height="80" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="760" y="168" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Anatomía del hash</text>
  <text x="645" y="186" fill="#f0883e" font-size="11">$2b$</text>
  <text x="676" y="186" fill="#8b949e" font-size="11">versión del algoritmo</text>
  <text x="645" y="202" fill="#58a6ff" font-size="11">$10$</text>
  <text x="676" y="202" fill="#8b949e" font-size="11">salt rounds (cost factor)</text>
  <text x="645" y="218" fill="#3fb950" font-size="11">N9qo...yeI</text>
  <text x="720" y="218" fill="#8b949e" font-size="11">salt (22 chars) + digest (31 chars)</text>

  <!-- ── COMPARISON FLOW ──────────────────────────────── -->
  <line x1="20" y1="248" x2="900" y2="248" stroke="#21262d" stroke-width="1"/>
  <text x="460" y="268" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="600">Verificación al hacer Login</text>

  <!-- Input 1: plaintext -->
  <rect x="30" y="278" width="180" height="50" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="120" y="298" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">Contraseña ingresada</text>
  <text x="120" y="316" text-anchor="middle" fill="#e6edf3" font-size="12">"miPassword123"</text>

  <!-- Input 2: stored hash -->
  <rect x="30" y="340" width="180" height="50" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="120" y="360" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Hash almacenado en DB</text>
  <text x="120" y="378" text-anchor="middle" fill="#e6edf3" font-size="11">$2b$10$N9qo...yeI</text>

  <!-- Arrows to compare -->
  <line x1="210" y1="303" x2="310" y2="330" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="210" y1="365" x2="310" y2="345" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- bcrypt.compare box -->
  <rect x="310" y="290" width="220" height="80" rx="8" fill="#1c2d44" stroke="#58a6ff" stroke-width="2"/>
  <text x="420" y="312" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">bcrypt.compare()</text>
  <text x="420" y="330" text-anchor="middle" fill="#8b949e" font-size="10">Extrae el salt del hash almacenado</text>
  <text x="420" y="346" text-anchor="middle" fill="#8b949e" font-size="10">Re-hashea con el mismo salt</text>
  <text x="420" y="362" text-anchor="middle" fill="#8b949e" font-size="10">Compara en tiempo constante</text>

  <!-- Arrows to results -->
  <line x1="530" y1="303" x2="610" y2="303" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="530" y1="362" x2="610" y2="372" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- True result -->
  <rect x="610" y="278" width="160" height="46" rx="6" fill="#1c2e1c" stroke="#3fb950" stroke-width="2"/>
  <text x="690" y="298" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="700">true</text>
  <text x="690" y="316" text-anchor="middle" fill="#8b949e" font-size="11">Credenciales válidas → 200</text>

  <!-- False result -->
  <rect x="610" y="350" width="160" height="46" rx="6" fill="#2d1b1b" stroke="#f85149" stroke-width="2"/>
  <text x="690" y="370" text-anchor="middle" fill="#f85149" font-size="13" font-weight="700">false</text>
  <text x="690" y="388" text-anchor="middle" fill="#8b949e" font-size="11">Credenciales inválidas → 401</text>

  <!-- Security note -->
  <rect x="790" y="278" width="110" height="118" rx="6" fill="#2d1b00" stroke="#bb8009" stroke-width="1"/>
  <text x="845" y="296" text-anchor="middle" fill="#d29922" font-size="10" font-weight="700">Timing Attack</text>
  <text x="845" y="312" text-anchor="middle" fill="#8b949e" font-size="9">bcrypt.compare</text>
  <text x="845" y="326" text-anchor="middle" fill="#8b949e" font-size="9">siempre tarda</text>
  <text x="845" y="340" text-anchor="middle" fill="#8b949e" font-size="9">lo mismo (tiempo</text>
  <text x="845" y="354" text-anchor="middle" fill="#8b949e" font-size="9">constante)</text>
  <text x="845" y="370" text-anchor="middle" fill="#8b949e" font-size="9">No revela si el</text>
  <text x="845" y="384" text-anchor="middle" fill="#8b949e" font-size="9">hash existe o no</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Salt rounds reference -->
  <rect x="30" y="152" width="580" height="80" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="320" y="170" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Salt Rounds — Cost Factor  (2ⁿ iteraciones)</text>
  <!-- mini table -->
  <text x="55" y="188" fill="#8b949e" font-size="11">Rounds 8:</text>
  <text x="130" y="188" fill="#f85149" font-size="11">256 iter — inseguro</text>
  <text x="285" y="188" fill="#8b949e" font-size="11">Rounds 10:</text>
  <text x="366" y="188" fill="#3fb950" font-size="11">1,024 iter — ✅ recomendado</text>
  <text x="55" y="208" fill="#8b949e" font-size="11">Rounds 12:</text>
  <text x="130" y="208" fill="#3fb950" font-size="11">4,096 iter — ✅ alta seguridad</text>
  <text x="285" y="208" fill="#8b949e" font-size="11">Rounds 14:</text>
  <text x="366" y="208" fill="#d29922" font-size="11">16,384 iter — lento para auth masiva</text>
</svg>
