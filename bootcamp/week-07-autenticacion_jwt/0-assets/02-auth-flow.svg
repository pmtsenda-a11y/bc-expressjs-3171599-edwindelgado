<svg viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="920" height="560" fill="#0d1117"/>

  <!-- Title -->
  <text x="460" y="34" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">Flujo de Autenticación con JWT + Cookies HttpOnly</text>

  <!-- ── REGISTER FLOW ───────────────────────────────────── -->
  <text x="230" y="62" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="700">REGISTRO</text>

  <!-- Step boxes -->
  <!-- 1 Client -->
  <rect x="40" y="72" width="380" height="38" rx="6" fill="#1c2e1c" stroke="#3fb950" stroke-width="1.5"/>
  <text x="52" y="88" fill="#3fb950" font-size="11" font-weight="700">① Cliente</text>
  <text x="52" y="103" fill="#e6edf3" font-size="11">POST /auth/register  { email, password, name }</text>

  <!-- Arrow -->
  <line x1="230" y1="110" x2="230" y2="128" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- 2 Validate -->
  <rect x="40" y="130" width="380" height="38" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="52" y="146" fill="#58a6ff" font-size="11" font-weight="700">② Server</text>
  <text x="52" y="161" fill="#e6edf3" font-size="11">Zod.parse(body)  →  findByEmail()  →  409 si existe</text>

  <line x1="230" y1="168" x2="230" y2="186" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- 3 Hash -->
  <rect x="40" y="188" width="380" height="38" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="52" y="204" fill="#58a6ff" font-size="11" font-weight="700">③ Server</text>
  <text x="52" y="219" fill="#e6edf3" font-size="11">bcrypt.hash(password, 10)  →  usersRepo.create()</text>

  <line x1="230" y1="226" x2="230" y2="244" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- 4 Response -->
  <rect x="40" y="246" width="380" height="38" rx="6" fill="#1c2d44" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="52" y="262" fill="#58a6ff" font-size="11" font-weight="700">④ Response</text>
  <text x="52" y="277" fill="#e6edf3" font-size="11">201 Created  { id, email, name, role }  ← sin password</text>

  <!-- ── LOGIN FLOW ───────────────────────────────────── -->
  <text x="690" y="62" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="700">LOGIN</text>

  <!-- Step boxes -->
  <!-- 1 Client -->
  <rect x="500" y="72" width="380" height="38" rx="6" fill="#1c2030" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="512" y="88" fill="#58a6ff" font-size="11" font-weight="700">① Cliente</text>
  <text x="512" y="103" fill="#e6edf3" font-size="11">POST /auth/login  { email, password }</text>

  <line x1="690" y1="110" x2="690" y2="128" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- 2 Validate -->
  <rect x="500" y="130" width="380" height="38" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="512" y="146" fill="#58a6ff" font-size="11" font-weight="700">② Server</text>
  <text x="512" y="161" fill="#e6edf3" font-size="11">findByEmailWithPassword()  →  401 si no existe</text>

  <line x1="690" y1="168" x2="690" y2="186" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- 3 Compare -->
  <rect x="500" y="188" width="380" height="38" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="512" y="204" fill="#58a6ff" font-size="11" font-weight="700">③ Server</text>
  <text x="512" y="219" fill="#e6edf3" font-size="11">bcrypt.compare()  →  signToken()  →  set cookies</text>

  <line x1="690" y1="226" x2="690" y2="244" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- 4 Response with cookies -->
  <rect x="500" y="246" width="380" height="55" rx="6" fill="#1c2d44" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="512" y="262" fill="#58a6ff" font-size="11" font-weight="700">④ Response  200 OK</text>
  <rect x="516" y="268" width="350" height="14" rx="3" fill="#21262d"/>
  <text x="523" y="279" fill="#3fb950" font-size="10">Set-Cookie: accessToken=eyJ...;  HttpOnly; Secure; SameSite=Lax; Max-Age=900</text>
  <rect x="516" y="284" width="350" height="14" rx="3" fill="#21262d"/>
  <text x="523" y="295" fill="#f0883e" font-size="10">Set-Cookie: refreshToken=eyJ...;  HttpOnly; Secure; SameSite=Lax; Max-Age=604800</text>

  <!-- Center separator line -->
  <line x1="460" y1="55" x2="460" y2="315" stroke="#21262d" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ── PROTECTED REQUEST ──────────────────────────────── -->
  <rect x="20" y="320" width="880" height="24" rx="4" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="460" y="336" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">PETICIÓN A RUTA PROTEGIDA</text>

  <!-- Row boxes -->
  <rect x="20" y="353" width="270" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="155" y="370" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700">Cliente</text>
  <text x="155" y="388" text-anchor="middle" fill="#8b949e" font-size="11">GET /auth/me</text>
  <text x="155" y="404" text-anchor="middle" fill="#8b949e" font-size="10">El navegador envía la cookie</text>
  <text x="155" y="420" text-anchor="middle" fill="#8b949e" font-size="10">automáticamente</text>

  <!-- Arrow -->
  <line x1="290" y1="393" x2="345" y2="393" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Auth middleware box -->
  <rect x="345" y="353" width="230" height="80" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="460" y="370" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700">authMiddleware</text>
  <text x="460" y="388" text-anchor="middle" fill="#8b949e" font-size="11">req.cookies.accessToken</text>
  <text x="460" y="404" text-anchor="middle" fill="#8b949e" font-size="11">verifyAccessToken(token)</text>
  <text x="460" y="420" text-anchor="middle" fill="#8b949e" font-size="11">req.user = decoded</text>

  <!-- Arrow -->
  <line x1="575" y1="393" x2="625" y2="393" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Controller box -->
  <rect x="625" y="353" width="275" height="80" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="762" y="370" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">Controller</text>
  <text x="762" y="388" text-anchor="middle" fill="#8b949e" font-size="11">req.user.sub → buscar usuario</text>
  <text x="762" y="404" text-anchor="middle" fill="#8b949e" font-size="11">200 { id, email, role }</text>
  <text x="762" y="420" text-anchor="middle" fill="#8b949e" font-size="11"> </text>

  <!-- ── LOGOUT ──────────────────────────────────────────── -->
  <rect x="20" y="446" width="880" height="24" rx="4" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="460" y="462" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">LOGOUT</text>

  <rect x="20" y="476" width="880" height="64" rx="6" fill="#1a1220" stroke="#8957e5" stroke-width="1.5"/>
  <text x="460" y="496" text-anchor="middle" fill="#8957e5" font-size="12" font-weight="700">POST /auth/logout  →  authMiddleware (requiere token válido)</text>
  <text x="460" y="514" text-anchor="middle" fill="#8b949e" font-size="11">user.refreshToken = undefined  →  guardar en DB</text>
  <text x="460" y="530" text-anchor="middle" fill="#8b949e" font-size="11">res.clearCookie('accessToken') + res.clearCookie('refreshToken')  →  200 OK</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3fb950"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
